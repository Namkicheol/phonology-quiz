<script>
const SAVE_KEY='ox_phon_flap_v1';
const TOTAL=15;
let cur=0,answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Flapping",cat:"예시 — butter",text:"'butter'에서 <span class='kw1'>/t/</span>는 <span class='kw2'>[ɾ]</span>로 실현된다.",ans:true,correct:"정확하다. 미국 영어에서 'butter'의 /t/는 강세모음(bú) 뒤, 비강세모음 앞에 위치하므로 [ɾ]로 flapping된다.",why:"Flapping 규칙: /t, d/ → [ɾ] / V́ __ V (강세모음 뒤, 비강세모음 앞). 'butter'에서 /t/는 /ˈbʌ/(강세모음) 뒤, /ər/(비강세모음) 앞에 위치하므로 flapping 환경을 충족합니다. 발음: [ˈbʌɾər].",source:"\"Flapping: /t, d/ → [ɾ] / V́ __ V. 'butter' → [ˈbʌɾər] in American English.\" (Yavaş 2011)",compare:[{title:"butter → [ˈbʌɾər]",desc:"강세모음 뒤, 비강세모음 앞 → [ɾ]"},{title:"top → [tʰɑp]",desc:"어두 강세위치 → flapping 환경 아님"}]},
  {src:"Flapping",cat:"적용 범위 — /t/ vs /d/",text:"Flapping은 <span class='kw4'>/t/에만</span> 적용되고 /d/에는 적용되지 않는다.",ans:false,correct:"틀렸다. Flapping은 <span class='kw1'>/t/</span>와 <span class='kw1'>/d/</span> 모두에 적용된다. 같은 환경(V́ __ V)에서 두 음 모두 [ɾ]로 실현된다.",why:"Flapping 규칙은 /t/와 /d/ 모두를 [ɾ]로 변환합니다. 이 때문에 미국 영어에서 'betting'과 'bedding', 'latter'와 'ladder'가 동일하게 발음될 수 있습니다. 두 단어가 [ɾ]로 중화(neutralization)됩니다.",source:"\"Flapping applies to both /t/ and /d/: /t, d/ → [ɾ] / V́ __ V. 'betting' = 'bedding' = [ˈbɛɾɪŋ] in American English.\" (Yavaş 2011)",compare:[{title:"betting [ˈbɛɾɪŋ]",desc:"/t/ → [ɾ] · flapping 적용"},{title:"bedding [ˈbɛɾɪŋ]",desc:"/d/ → [ɾ] · flapping 적용"}]},
  {src:"Flapping",cat:"규칙 형식화",text:"Flapping 규칙: <span class='kw1'>/t,d/ → [ɾ]</span> / <span class='kw2'>강세 모음 뒤, 비강세 모음 앞</span>.",ans:true,correct:"정확하다. Flapping의 정확한 환경: 강세모음(V́) 뒤 + 비강세모음(V) 앞.",why:"Flapping 규칙의 핵심 두 조건: (1) 앞에 강세모음(V́)이 있어야 함, (2) 뒤에 비강세모음(V)이 있어야 함. 두 조건이 모두 충족될 때 /t, d/ → [ɾ]가 일어납니다. 어두(word-initial) /t/는 강세모음 앞이더라도 flapping되지 않습니다.",source:"\"Flapping rule: /t, d/ → [ɾ] / V́ __ V (after stressed vowel, before unstressed vowel).\" (Yavaş 2011)",compare:[{title:"환경 조건 1",desc:"앞: 강세모음 V́ · 필수"},{title:"환경 조건 2",desc:"뒤: 비강세모음 V · 필수"}]},
  {src:"Flapping",cat:"환경 — 어두 /t/",text:"'top'의 어두 <span class='kw1'>/t/</span>는 flapping된다.",ans:false,correct:"틀렸다. 어두 /t/는 강세모음 <span class='kw2'>앞</span>에 위치하므로 flapping 환경이 아니다. 강세모음 <span class='kw2'>뒤</span>가 아니기 때문.",why:"'top'의 /t/는 어두(word-initial) 위치에 있습니다. Flapping은 강세모음 뒤(after V́)가 필수 조건이므로, 강세모음 앞에 오는 어두 /t/는 flapping 환경을 충족하지 않습니다. 'top'의 /t/는 오히려 aspiration([tʰ])이 일어납니다.",source:"\"Word-initial /t/ precedes V́, not follows — flapping environment not met. 'top' → [tʰɑp], not *[ɾɑp].\" (Yavaş 2011)",compare:[{title:"top [tʰɑp]",desc:"어두 /t/ → aspiration · flapping 없음"},{title:"butter [ˈbʌɾər]",desc:"V́ 뒤 /t/ → [ɾ] · flapping 적용"}]},
  {src:"Flapping",cat:"[ɾ] 음성 정체",text:"<span class='kw1'>[ɾ]</span>은 <span class='kw2'>alveolar flap</span>이다.",ans:true,correct:"정확하다. [ɾ]은 alveolar flap(치경 탄음)으로, 혀끝이 치경을 빠르게 한 번 두드리는 소리다.",why:"[ɾ]는 IPA에서 alveolar flap(tap)을 나타냅니다. 혀끝(tongue tip)이 치경(alveolar ridge)을 빠르게 한 번 접촉하는 방식으로 조음됩니다. Flap과 tap은 거의 같은 의미로 사용되며, alveolar trill [r]과는 다릅니다.",source:"\"[ɾ] = alveolar flap/tap: tongue tip makes a single, rapid contact with the alveolar ridge.\" (IPA; Yavaş 2011)",compare:[{title:"[ɾ] alveolar flap",desc:"단일 접촉 · 빠른 두드림 · flapping 결과음"},{title:"[r] alveolar trill",desc:"반복 진동 · 스페인어 'perro' 등"}]},
  {src:"Flapping",cat:"[ɾ]의 음소 지위",text:"영어에서 <span class='kw1'>[ɾ]</span>과 <span class='kw2'>/r/</span>은 같은 음소다.",ans:false,correct:"틀렸다. [ɾ]은 /r/의 변이음이 아니라 <span class='kw1'>/t/</span> 또는 <span class='kw1'>/d/</span>의 변이음이다.",why:"영어에서 [ɾ]은 flapping 환경(V́ __ V)에서 /t/ 또는 /d/가 실현되는 변이음(allophone)입니다. /r/의 변이음이 아닙니다. 따라서 [ɾ]은 /t,d/ 음소에 속하는 allophone이며, /r/은 별도의 음소입니다.",source:"\"[ɾ] is an allophone of /t/ and /d/ in American English, not of /r/.\" (Yavaş 2011)",compare:[{title:"[ɾ] = /t/ 또는 /d/의 allophone",desc:"flapping 환경에서 /t,d/ → [ɾ]"},{title:"/r/ = 별도의 음소",desc:"'red', 'run' 등 · [ɾ]과 무관"}]},
  {src:"Flapping",cat:"예시 — water",text:"'water'는 미국 영어에서 <span class='kw1'>[ˈwɔɾər]</span>로 실현된다.",ans:true,correct:"정확하다. 미국 영어 구어에서 'water'의 /t/는 flapping 환경을 충족하여 [ɾ]로 실현된다.",why:"'water'에서 /t/는 /ˈwɔ/(강세모음) 뒤, /ər/(비강세모음) 앞에 위치합니다. Flapping 환경(V́ __ V)을 충족하므로 /t/ → [ɾ], 결과: [ˈwɔɾər]. 미국 영어의 전형적인 flapping 예시입니다.",source:"\"'water' → [ˈwɔɾər] in American English: /t/ after V́ /ɔ/, before unstressed /ər/.\" (Yavaş 2011)",compare:[{title:"water [ˈwɔɾər]",desc:"미국 영어 · /t/ → [ɾ]"},{title:"water [ˈwɔtər]",desc:"영국 영어 · flapping 없음"}]},
  {src:"Flapping",cat:"예시 — body",text:"'body'에서 <span class='kw1'>/d/ → [ɾ]</span>이 일어난다.",ans:true,correct:"정확하다. 미국 영어에서 'body'의 /d/는 강세모음(bó) 뒤, 비강세모음 앞이므로 [ɾ]로 flapping된다.",why:"'body'[ˈbɑdi]에서 /d/는 /ˈbɑ/(강세모음) 뒤, /i/(비강세모음) 앞에 위치합니다. Flapping 환경을 충족하므로 /d/ → [ɾ], 결과: [ˈbɑɾi]. /d/에도 flapping이 적용됨을 보여주는 전형적인 예입니다.",source:"\"'body' → [ˈbɑɾi]: /d/ flaps to [ɾ] after stressed V, before unstressed V.\" (Yavaş 2011)",compare:[{title:"body [ˈbɑɾi]",desc:"/d/ → [ɾ] · flapping 적용"},{title:"butter [ˈbʌɾər]",desc:"/t/ → [ɾ] · flapping 적용"}]},
  {src:"Flapping",cat:"방언 분포",text:"Flapping은 <span class='kw4'>British English</span>의 특징이다.",ans:false,correct:"틀렸다. Flapping은 <span class='kw1'>American English</span>(미국 영어)의 특징이다. 영국 영어에서는 /t,d/가 그대로 실현된다.",why:"Flapping([ɾ])은 미국 영어(및 캐나다 영어)의 대표적인 음운론적 특징입니다. 영국 영어(RP)에서는 'water', 'butter' 등에서 /t/가 flapping되지 않고 [t] 또는 성문음화([ʔ])로 실현됩니다.",source:"\"Flapping is characteristic of <span class='kw1'>American English</span>, not British English.\" (Yavaş 2011)",compare:[{title:"American English",desc:"flapping 적용 · water=[ˈwɔɾər]"},{title:"British English (RP)",desc:"flapping 없음 · water=[ˈwɔtə]"}]},
  {src:"Flapping",cat:"예시 — city",text:"'city'는 <span class='kw1'>[ˈsɪɾi]</span>로 실현될 수 있다.",ans:true,correct:"정확하다. 'city'의 /t/는 /ˈsɪ/(강세모음) 뒤, /i/(비강세모음) 앞이므로 [ɾ]로 flapping된다.",why:"'city'[ˈsɪti]에서 /t/는 /ˈsɪ/(강세모음) 뒤, /i/(비강세모음) 앞에 위치합니다. Flapping 환경 충족 → [ˈsɪɾi]. 미국 영어 구어에서 매우 일반적인 발음입니다.",source:"\"'city' → [ˈsɪɾi] in American English: flapping of /t/ in V́ __ V environment.\" (Yavaş 2011)",compare:[{title:"city [ˈsɪɾi]",desc:"미국 영어 · /t/ → [ɾ]"},{title:"pity [ˈpɪɾi]",desc:"미국 영어 · /t/ → [ɾ]"}]},
  {src:"Flapping",cat:"필수 조건",text:"Flapping 환경의 필수 조건 중 하나는 <span class='kw2'>강세 모음</span>이 앞에 오는 것이다.",ans:true,correct:"정확하다. Flapping의 두 필수 조건: (1) 앞에 강세모음(V́), (2) 뒤에 비강세모음(V). 둘 다 충족되어야 한다.",why:"강세모음(V́)이 앞에 오는 것은 flapping의 필수 조건입니다. 예: 'atom'[ˈæɾəm]에서 /æ/가 강세이므로 /t/ → [ɾ]. 반면 'atomic'[əˈtɑmɪk]에서 /t/ 앞의 /ə/는 비강세이므로 flapping이 일어나지 않습니다.",source:"\"Flapping requires: V́ before /t,d/. Compare 'atom' [ˈæɾəm] (flapping) vs. 'atomic' [əˈtɑmɪk] (no flapping).\" (Yavaş 2011)",compare:[{title:"atom [ˈæɾəm]",desc:"V́ /æ/ 앞에 → flapping 적용"},{title:"atomic [əˈtɑmɪk]",desc:"V /ə/ 앞에 → flapping 없음"}]},
  {src:"Flapping",cat:"중화 — betting/bedding",text:"'betting'과 'bedding'은 미국 영어 구어에서 동일하게 발음될 수 있다.",ans:true,correct:"정확하다. flapping으로 두 단어 모두 [ˈbɛɾɪŋ]이 되어 음성적으로 중화(neutralization)된다.",why:"'betting'의 /t/와 'bedding'의 /d/ 모두 강세모음 /ɛ/ 뒤, 비강세모음 /ɪ/ 앞에 위치하므로 flapping 환경을 충족합니다. 두 음 모두 [ɾ]로 실현되어 [ˈbɛɾɪŋ]이 됩니다. 이처럼 flapping이 /t/와 /d/의 대립을 중화시킵니다.",source:"\"Flapping neutralizes /t/ vs. /d/ contrast: 'betting' = 'bedding' = [ˈbɛɾɪŋ] in casual American English.\" (Yavaş 2011)",compare:[{title:"betting → [ˈbɛɾɪŋ]",desc:"/t/ → [ɾ] · neutralization"},{title:"bedding → [ˈbɛɾɪŋ]",desc:"/d/ → [ɾ] · neutralization"}]},
  {src:"Flapping",cat:"[ɾ] vs. [r] 구분",text:"<span class='kw1'>[ɾ]</span>는 IPA에서 <span class='kw4'>alveolar trill</span>과 같다.",ans:false,correct:"틀렸다. <span class='kw4'>alveolar trill</span>은 <span class='kw1'>[r]</span>이고, alveolar flap은 <span class='kw1'>[ɾ]</span>이다. 두 기호는 다른 소리다.",why:"IPA에서 [r]은 alveolar trill(치경 전동음): 혀가 여러 번 빠르게 진동하는 소리입니다. [ɾ]은 alveolar flap(치경 탄음): 혀가 한 번만 빠르게 접촉하는 소리입니다. 영어 flapping의 결과음은 [ɾ]이지 [r]이 아닙니다.",source:"\"IPA [r] = alveolar trill (multiple contacts); [ɾ] = alveolar flap (single rapid contact). English flapping → [ɾ].\" (IPA; Yavaş 2011)",compare:[{title:"[ɾ] alveolar flap",desc:"단일 접촉 · 영어 flapping 결과"},{title:"[r] alveolar trill",desc:"반복 진동 · 스페인어 'perro'"}]},
  {src:"Flapping",cat:"중화 — later/ladder",text:"'later'와 'ladder'는 미국 영어에서 동일하게 발음될 수 있다.",ans:true,correct:"정확하다. flapping으로 'later'와 'ladder' 모두 [ˈleɪɾər]이 되어 음성적으로 구별되지 않는다.",why:"'later'의 /t/와 'ladder'의 /d/ 모두 강세모음 /eɪ/ 뒤, 비강세모음 /ər/ 앞에 위치합니다. Flapping 결과: later=[ˈleɪɾər], ladder=[ˈleɪɾər]로 동일하게 발음됩니다. 이것이 미국 영어에서 flapping으로 인한 phonemic neutralization의 전형적인 예입니다.",source:"\"'later' and 'ladder' merge as [ˈleɪɾər] through flapping in American English.\" (Yavaş 2011)",compare:[{title:"later → [ˈleɪɾər]",desc:"/t/ → [ɾ] · flapping"},{title:"ladder → [ˈleɪɾər]",desc:"/d/ → [ɾ] · flapping"}]},
  {src:"Flapping",cat:"음소 대립",text:"Flapping은 음소 대립을 만들지 않는다.",ans:true,correct:"정확하다. Flapping은 <span class='kw1'>allophonic rule</span>로, /t/와 /d/ 사이의 음소 대립을 파괴하지 않고 변이음을 생성할 뿐이다.",why:"Flapping은 특정 환경(V́ __ V)에서 예측 가능하게 일어나는 allophonic rule입니다. [ɾ]는 /t/ 또는 /d/의 변이음이지 독립된 음소가 아닙니다. 따라서 [ɾ]이 나타나는 것만으로는 새로운 음소 대립이 형성되지 않습니다.",source:"\"Flapping is an allophonic rule: [ɾ] does not create new phonemic contrasts, it is a predictable variant of /t/ and /d/.\" (Yavaş 2011)",compare:[{title:"Allophonic rule",desc:"예측 가능 · 음소 대립 없음"},{title:"Phonemic contrast",desc:"/t/ vs /d/ 대립 · flapping과 무관"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
</body>
</html>
