<script>
const SAVE_KEY='phono_stress_q28';
const TOTAL=28;
let cur=0,answers=new Array(TOTAL).fill(null);

const Q=[
/* ── 기초 ── */
{src:"IPA 표기법",cat:"Basics",
 text:"IPA에서 강세 기호 <span class='kw1'>ˈ</span>(primary)와 <span class='kw1'>ˌ</span>(secondary)는 강세를 받는 음절의 <b>뒤</b>에 표기한다.",
 ans:false,
 correct:"강세 기호는 해당 음절의 <span class='kw2'>앞</span>에 온다. 예: <span class='kw1'>/ˈfoʊtəgræf/</span> — ˈ는 강세 받는 음절 <b>시작 앞</b>에 위치.",
 why:"IPA 협약(IPA 1999): stress mark precedes the syllable it belongs to. 철자 <b>뒤</b>에 어포스트로피처럼 쓰는 것은 잘못된 표기. 예: fo'tograph (×) → /ˈfoʊtəgræf/ (○)"},

{src:"강세 3단계",cat:"Basics",
 text:"<span class='kw1'>Secondary stress(ˌ)</span>를 받는 음절과 <span class='kw2'>unstressed</span> 음절은 강세의 세기가 동일하다.",
 ans:false,
 correct:"세기 순서: <span class='kw1'>primary(ˈ)</span> > <span class='kw2'>secondary(ˌ)</span> > <span class='kw2'>unstressed</span>. Secondary ≠ unstressed.",
 why:"Secondary stress는 unstressed보다 강하지만 primary보다 약한 중간 단계. 예: <span class='kw1'>ˌpho·to·ˈgraph·ic</span> — ˌpho는 secondary, ·to·는 unstressed.",
 compare:[{title:"<span class='kw1'>Primary ˈ</span>",desc:"가장 강함 · 핵심 음절"},{title:"<span class='kw2'>Secondary ˌ</span>",desc:"중간 · primary보다 약함"},{title:"<span class='kw2'>Unstressed</span>",desc:"가장 약함 · 종종 schwa"}]},

{src:"Primary stress 개수",cat:"Basics",
 text:"영어 단어에서 <span class='kw1'>primary stress(ˈ)</span>는 항상 정확히 하나 존재하며, secondary stress(ˌ)는 없을 수도 있다.",
 ans:true,
 correct:"영어 단어는 primary stress 하나가 필수. Secondary stress는 장단어에서 추가될 수 있지만 없어도 됨.",
 why:"예: <span class='kw1'>ˈdog</span>(primary 1개, secondary 없음) / <span class='kw1'>ˌpho·to·ˈgraph·ic</span>(primary 1개, secondary 1개). Primary가 두 개인 단어는 영어에 없음."},

{src:"Schwa 실현 환경",cat:"Basics",
 text:"<span class='kw1'>/ə/(schwa)</span>는 비강세(unstressed) 음절에서 실현되며, primary stress를 받는 음절에는 나타나지 않는다.",
 ans:true,
 correct:"Schwa는 비강세 환경에서만 출현. <span class='kw2'>강세 음절</span>에는 full vowel(/æ/, /eɪ/, /oʊ/ 등)이 유지됨.",
 why:"예: <span class='kw1'>photograph /ˈfoʊtəgræf/</span> — 첫 음절 ˈfoʊ에는 /oʊ/, 비강세 두 번째 음절은 /ə/. 강세 이동 시 약화 위치도 이동: phoˈtography /fəˈtɒgrəfi/ — 이번엔 첫 음절 /fə/."},

/* ── Heavy / Light Syllable ── */
{src:"Heavy/Light Syllable 정의",cat:"Heavy/Light",
 text:"<span class='kw1'>Heavy syllable</span>이란 (a) 장모음·이중모음을 포함하거나, (b) 단모음에 코다 자음이 하나 이상 있는 음절을 가리킨다.",
 ans:true,
 correct:"Heavy = 장모음/이중모음 OR 단모음 + 코다(closed syllable). Light = 단모음 + 개음절(no coda).",
 why:"예: <span class='kw1'>beat</span> /biːt/ — 장모음 → heavy. <span class='kw1'>bit</span> /bɪt/ — 단모음 + coda /t/ → heavy. <span class='kw2'>bi</span> /bɪ/ — 단모음, coda 없음 → light.",
 compare:[{title:"<span class='kw1'>Heavy (H)</span>",desc:"장모음·이중모음 OR 단모음+coda"},{title:"<span class='kw2'>Light (L)</span>",desc:"단모음 + coda 없음 (open syllable)"}]},

{src:"Heavy/Light & Stress",cat:"Heavy/Light",
 text:"<span class='kw1'>Heavy syllable</span>은 강세를 유인(attract)하고, <span class='kw2'>light syllable</span>은 강세를 회피(avoid)하는 경향이 있다.",
 ans:true,
 correct:"Heavy syllable의 강세 유인 성질은 영어 단어 강세 배정 규칙의 핵심.",
 why:"Penultimate heavy → penultimate stress 규칙의 근거. 예: <span class='kw1'>aˈgenda</span> — gen이 heavy(단모음+/n/) → 두 번째 음절 강세. <span class='kw1'>ˈcalendar</span> — -en- light → 강세 앞으로 이동."},

{src:"agenda 강세",cat:"Heavy/Light",
 text:"'agenda'의 강세는 첫 번째 음절에 있다 — <span class='kw4'>/ˈæʤəndə/</span>.",
 ans:false,
 correct:"<span class='kw1'>/əˈʤendə/</span> — 두 번째 음절 <b>-gen-</b>이 heavy(단모음 /e/ + coda /n/)이므로 penultimate rule 적용 → 두 번째 음절 강세.",
 why:"Penultimate(끝에서 두 번째) 음절 -gen- : closed syllable → heavy → 강세 유인. 첫 음절 a- : /ə/ → light, unstressed. 많이 틀리는 단어: agenda, arena, antenna 등.",
 compare:[{title:"<span class='kw1'>agenda</span>",desc:"/əˈʤendə/ — gen heavy"},{title:"<span class='kw2'>panorama</span>",desc:"/ˌpænəˈrɑːmə/ — -ra- heavy"}]},

{src:"calendar 강세",cat:"Heavy/Light",
 text:"'calendar /ˈkælɪndər/'에서 penultimate 음절 '-en-'이 <span class='kw2'>light</span>하기 때문에 강세가 antepenultimate(첫 번째)으로 이동한다.",
 ans:true,
 correct:"Penultimate -en- : 단모음 /ɪ/ + coda /n/... wait — /kæl·ɪn·dər/ → pen= -in- 단모음 /ɪ/ + no coda between syllables. Actually -in- is light (short vowel, coda goes to next syllable) → antepenultimate <b>cal-</b> gets stress.",
 why:"Latin-origin words: penult heavy → stress penult / penult light → stress antepenult. -cal-(-kæl-) is the antepenult that receives stress. Cf. aˈgenda (penult heavy)."},

{src:"라틴 어원 명사 강세 규칙",cat:"Noun Stress",
 text:"라틴어 어원 다음절 명사에서 penultimate(끝에서 두 번째) 음절이 <span class='kw1'>heavy</span>하면 그 음절에 primary stress가 온다.",
 ans:true,
 correct:"Penultimate Heavy Rule: 명사에서 penult heavy → penult stress. Penult light → antepenult stress.",
 why:"기출 핵심 규칙. 예: <span class='kw1'>aˈgenda</span>(gen-H), <span class='kw1'>aˈrena</span>(re-H: 장모음), <span class='kw1'>ˈcalendar</span>(en-L → cal에 강세). 동사도 유사 규칙 적용.",
 compare:[{title:"Penult <span class='kw1'>H</span> → Penult 강세",desc:"agenda, arena, diploma"},{title:"Penult <span class='kw2'>L</span> → Antepenult 강세",desc:"calendar, editor, industry"}]},

{src:"photography 강세",cat:"Noun Stress",
 text:"'phoˈtography /fəˈtɒgrəfi/'에서 두 번째 음절 <b>-tog-</b>에 강세가 오는 것은, penultimate 음절 <b>-ra-</b>가 light하여 antepenultimate인 -tog-으로 강세가 이동하기 때문이다.",
 ans:true,
 correct:"4음절: pho-<b>tog</b>-ra-phy. Penult = -ra- (/rə/, light). Antepenult = -tog- (/tɒg/, heavy: 단모음+/g/ coda) → 강세 antepenult.",
 why:"Strong syllable 검증: -tog- 는 closed syllable(단모음 /ɒ/ + coda /g/) → heavy. 따라서 penult rule 불충족 → antepenult인 -tog- 강세. 파생어 체인: <span class='kw1'>ˈphotograph → phoˈtography → ˌphoˈtographic</span>"},

/* ── Suffix Stress ── */
{src:"-ic suffix",cat:"Suffix Stress",
 text:"-ic suffix는 <span class='kw1'>예외 없이</span> 모든 단어에서 직전 음절에 강세를 이동시킨다.",
 ans:false,
 correct:"-ic는 일반적으로 직전 음절 강세 이동 suffix이지만, <span class='kw2'>ˈarabic, ˈcatholic, ˈlunar·tic</span> 등 예외가 존재한다.",
 why:"일반 규칙: ecoˈnomic, photoˈgraphic, geˈographic. 예외: <span class='kw2'>ˈarabic</span>(ˈær-ə-bɪk), <span class='kw2'>ˈcatholic</span>, <span class='kw2'>ˈrhetoric</span> — 이들은 antepenultimate에 강세 유지.",
 compare:[{title:"✅ 규칙 적용",desc:"ecoˈnomic / photoˈgraphic"},{title:"❌ 예외",desc:"ˈarabic / ˈcatholic / ˈrhetoric"}]},

{src:"-ness / -ful / -less / -ment / -ly",cat:"Suffix Stress",
 text:"-ness, -ful, -less, -ment, -ly는 모두 <span class='kw1'>stress-neutral suffix</span>로, 어기의 강세를 변화시키지 않는다.",
 ans:true,
 correct:"이 다섯 접미사는 stress-neutral: 어기의 강세 위치가 그대로 유지됨.",

function renderExp(q,isCorrect){
  let h=`<div class="exp show"><div class="exp-header"><span>Explanation</span></div><div class="exp-answer"><div class="ans-label">정답 — ${q.ans?'O (correct)':'X (wrong)'}</div><div class="ans-text">${q.correct}</div></div><div class="exp-body">`;
  if(q.why){h+=`<div class="sec-label">Why</div><p>${q.why}</p>`;}
  if(q.source){h+=`<div class="sec-label">Source</div><div class="def-box"><p>${q.source}</p></div>`;}
  if(q.compare&&q.compare.length){
    const cls=q.compare.length===3?'compare three':'compare';
    h+=`<div class="sec-label">Compare</div><div class="${cls}">`;
    q.compare.forEach(c=>{h+=`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`;});
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}
function getScore(){return answers.filter(a=>a&&a.correct).length;}
function renderNav(){
  const n=document.getElementById('nav');
  n.innerHTML='';
  answers.forEach((_,i)=>{
    const a=answers[i];
    const cls=i===cur?'nd cur':a===null?'nd':a.correct?'nd ok':'nd ng';
    n.innerHTML+=`<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  });
}
function restart(){cur=0;answers=new Array(TOTAL).fill(null);localStorage.removeItem(SAVE_KEY);document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(()=>{window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oc='',xc='';
    if(a.picked===true){oc=a.correct?'co':'wp';if(!a.correct)xc='cx';}
    else{xc=a.correct?'cx':'wp';if(!a.correct)oc='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oc}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xc}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
