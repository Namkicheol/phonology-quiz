.score-circle{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#1a5276,#2980b9);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 40px rgba(26,82,118,.3)}

.nd:hover:not(.cur){opacity:.7}
#nav{display:flex;flex-wrap:wrap;gap:5px;max-width:720px;margin:0 auto 16px;padding:0 8px}

<script>
const SAVE_KEY='ox_phon_stress_v1';
const TOTAL=15;
let cur=0,answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Primary Stress",cat:"IPA 표기 기호",text:"IPA에서 강세 기호 <span class='kw1'>ˈ</span>는 강세를 받는 음절 <span class='kw2'>위</span>에 표기한다.",ans:false,correct:"강세 기호 <span class='kw1'>ˈ</span>는 강세 받는 음절 <span class='kw2'>앞(before)</span>에 온다. 예: /ˈfoʊtəgræf/에서 ˈ가 'pho' 바로 앞.",why:"IPA에서 primary stress(ˈ)와 secondary stress(ˌ)는 모두 해당 음절의 앞(before)에 표기합니다. 스페인어 á처럼 음절 위에 쓰는 악센트 기호와 혼동하지 않도록 주의해야 합니다.",source:"\"Primary stress <span class='kw1'>ˈ</span> and secondary stress <span class='kw1'>ˌ</span> are placed <span class='kw2'>before</span> the stressed syllable in IPA transcription.\"",compare:[{title:"✅ 올바른 IPA 표기",desc:"/ˈfoʊ.tə.græf/ — ˈ가 음절 <span class='kw2'>앞</span>"},{title:"❌ 흔한 오류",desc:"/pho'tograph/ — IPA 표기가 아님"}]},
  {src:"Secondary Stress",cat:"강세 단계 구분",text:"<span class='kw3'>Secondary stress</span> 음절은 unstressed 음절과 마찬가지로 <span class='kw2'>full vowel이 없다</span>.",ans:false,correct:"<span class='kw3'>Secondary stress</span> 음절은 반드시 <span class='kw2'>+full vowel</span>을 가진다. 모음 약화(/ə/)는 <span class='kw4'>-stress</span> 음절에서만 일어난다.",why:"Secondary stress는 엄연히 +stress 음절입니다. Full vowel(전모음)을 반드시 가지며, 단지 tonic accent(주요 음조 변화)가 없을 뿐입니다. /ə/(schwa)는 오직 -stress 음절에서만 나타납니다.",source:"\"Secondary stressed syllable: <span class='kw2'>+stress</span>, -tonic accent, <span class='kw2'>+full V</span>. Unstressed: -stress, -tonic accent, +/-full V.\" (Yavaş 2011)",compare:[{title:"Secondary stress",desc:"+stress · <span class='kw2'>+full V</span> · -tonic acc."},{title:"Unstressed",desc:"-stress · <span class='kw2'>+/-full V</span> · -tonic acc."}]},
  {src:"Stress-timing",cat:"영어 리듬 특성",text:"영어는 <span class='kw1'>syllable-timed</span> 언어이므로 모든 음절이 동일한 길이로 발음된다.",ans:false,correct:"영어는 <span class='kw1'>stress-timed</span> 언어다. <span class='kw1'>Syllable-timed</span>는 스페인어·프랑스어·한국어의 특성.",why:"Stress-timed에서는 강세 음절이 등간격으로 나타나고 비강세 음절이 압축됩니다. Syllable-timed에서는 모든 음절이 동일한 길이를 유지합니다. 한국인 학습자의 영어 발음이 어색한 이유 중 하나가 모국어가 syllable-timed이기 때문입니다.",source:"\"English is <span class='kw1'>stress-timed</span>: stressed syllables occur at roughly equal intervals; unstressed syllables are compressed.\" (Yavaş 2011, Ch.1)",compare:[{title:"<span class='kw1'>Stress-timed</span>",desc:"강세 등간격 · 비강세 압축 · <span class='kw2'>영어, 독일어</span>"},{title:"<span class='kw1'>Syllable-timed</span>",desc:"모든 음절 등간격 · <span class='kw2'>스페인어, 한국어</span>"}]},
  {src:"Primary Stress",cat:"Tonic Accent",text:"<span class='kw1'>Tonic accent</span>는 primary stress 음절에만 나타나며, 이 음절에서 <span class='kw2'>주요 음조 변화(major pitch change)</span>가 일어난다.",ans:true,correct:"정확하다. <span class='kw1'>Tonic accent</span> = major pitch change = primary stress 음절의 핵심 특징. Secondary stress 음절에는 없다.",why:"Yavaş는 primary와 secondary의 차이를 pitch pattern의 superimposition(중첩)으로 설명합니다. Primary stressed 음절만이 major pitch change(tonic accent)를 가집니다. Secondary는 두드러지지만 음조 변화가 없는 음절입니다.",source:"\"The syllable that is commonly known as the <span class='kw1'>primary stressed</span> syllable is the one with the <span class='kw2'>major pitch change</span>. This is called the <span class='kw1'>tonic accent</span>.\" (Yavaş 2011)",compare:[{title:"Primary stress",desc:"+stress · <span class='kw1'>+tonic accent</span> · +full V"},{title:"Secondary stress",desc:"+stress · <span class='kw1'>-tonic accent</span> · +full V"}]},
  {src:"Primary Stress",cat:"강세 지각 단서",text:"영어에서 강세 지각의 핵심 단서는 <span class='kw2'>loudness(음량)</span>이다.",ans:false,correct:"영어에서 가장 중요한 강세 지각 단서는 <span class='kw2'>pitch(음높이)</span>이다 (Fry 1955, 1979).",why:"강세 음절은 loudness, duration, pitch 모두에서 비강세보다 두드러지지만, 영어에서는 pitch가 가장 영향력 있는 지각 단서입니다. Fry의 실험 연구로 밝혀진 사실입니다.",source:"\"In English, <span class='kw2'>higher pitch</span> has been shown to be the most influential perceptual cue [for stress] (Fry 1955, 1979).\" (Yavaş 2011)",compare:[{title:"Loudness",desc:"강세 > 비강세 · 보조 단서"},{title:"Duration",desc:"강세 > 비강세 · 보조 단서"},{title:"<span class='kw2'>Pitch</span>",desc:"<span class='kw2'>핵심 단서 (영어)</span> · Fry 1955"}]},
  {src:"Secondary Stress",cat:"수치 체계",text:"<span class='kw3'>photographic</span>의 Yavaş 수치 표기는 <span class='kw2'>4 1 4 4</span>이다.",ans:false,correct:"<span class='kw3'>photographic</span>의 수치 표기는 <span class='kw2'>2 4 1 4</span>이다 — pho-(secondary=2), -to-(reduced=4), -graph-(primary=1), -ic(reduced=4).",why:"Yavaş 수치 체계: 1=primary, 2=secondary, 3=전모음 unstressed, 4=약화(reduced). /ˌfoʊtəˈgræfɪk/에서 1번째 음절(pho-)이 secondary(2), 3번째(-graph-)가 primary(1).",source:"\"A syllable with three pluses → 1 [primary]; two pluses → 2 [secondary]; one plus → 3; no pluses → 4. photographic = <span class='kw2'>2 4 1 4</span>.\" (Yavaş 2011)",compare:[{title:"<span class='kw3'>photography</span>",desc:"4 <span class='kw2'>1</span> 4 3 — primary 2번째"},{title:"<span class='kw3'>photographic</span>",desc:"<span class='kw3'>2</span> 4 <span class='kw2'>1</span> 4 — sec 1st + primary 3rd"}]},
  {src:"Secondary Stress",cat:"Secondary Stress 위치",text:"Secondary stress는 일반적으로 <span class='kw2'>primary stress 뒤</span>에 온다.",ans:false,correct:"Secondary stress는 일반적으로 <span class='kw2'>primary stress 앞</span>에 온다 — 주요 음조 변화는 마지막 강세 음절에서 나타나기 때문.",why:"Yavaş의 원칙: '(c) In general, secondary stress comes before the primary stress.' 이는 major pitch change가 발화에서 마지막 강세 음절에 나타나는 경향 때문입니다. 예: ˌpho-to-ˈgraph-ic에서 secondary(pho-)가 primary(graph-) 앞.",source:"\"In general, <span class='kw2'>secondary stress comes before</span> the primary stress (major pitch change tends to be on the last stressed syllable).\" (Yavaş 2011)",compare:[{title:"ˌpho·to·ˈgraph·ic",desc:"sec <span class='kw2'>앞</span> → primary 뒤"},{title:"ˌbam·ˈboo",desc:"sec <span class='kw2'>앞</span> → primary 뒤 (2음절)"}]},
  {src:"Secondary Stress",cat:"연속 약화 음절",text:"영어에서 연속 reduced vowel은 최대 <span class='kw2'>3개</span>까지 나타나는 것이 일반적이다.",ans:false,correct:"연속 reduced vowel은 영어에서 주로 최대 <span class='kw2'>2개</span>까지다 — Yavaş secondary stress 식별 원칙 (a).",why:"Yavaş의 원칙 (a): '연속 약화 음절은 주로 최대 2개까지다.' 만약 약화 음절이 3개 연속이라면 중간에 secondary stress가 있을 가능성이 높습니다.",source:"\"(a) The longest sequence of reduced vowels in an English word is predominantly <span class='kw2'>two</span>.\" (Yavaş 2011)",compare:[{title:"최대 약화 연속",desc:"주로 <span class='kw2'>2개</span> — 3개면 secondary 의심"},{title:"예: reconciliation",desc:"/ˌrekənˌsɪliˈeɪʃn/ — secondary 삽입"}]},
  {src:"Primary Stress",cat:"Full Vowel",text:"Primary stressed 음절과 secondary stressed 음절 모두 반드시 <span class='kw2'>full vowel(전모음)</span>을 갖는다.",ans:true,correct:"정확하다. +stress 음절(primary·secondary 모두)은 반드시 <span class='kw2'>+full vowel</span>이다. /ə/는 <span class='kw4'>-stress</span> 음절에서만.",why:"Yavaş의 핵심 원칙: 'A stressed syllable necessarily has a full vowel.' 강세(primary든 secondary든) = full vowel. 반대로 /ə/(schwa)는 -stress 음절의 표지입니다.",source:"\"A <span class='kw2'>stressed syllable</span> necessarily has a <span class='kw2'>full vowel</span> (no vowel reduction can take place in a stressed syllable).\" (Yavaş 2011)",compare:[{title:"+stress (primary/secondary)",desc:"반드시 <span class='kw2'>full vowel</span>"},{title:"-stress (unstressed)",desc:"full vowel 또는 <span class='kw2'>/ə/ 약화</span>"}]},
  {src:"Primary Stress",cat:"영어 강세 특성",text:"영어 강세는 모든 단어에서 <span class='kw2'>첫 번째 음절에 고정</span>되어 있다.",ans:false,correct:"영어 강세는 <span class='kw2'>variable(가변적)</span>이다 — article(1st), tomato(2nd), kangaroo(3rd)처럼 어느 음절이나 강세를 받을 수 있다.",why:"영어는 'variable stress' 언어입니다. 고정 강세 언어(체코어=1st, 프랑스어=last, 폴란드어=penult)와 다릅니다. 영어에서 강세 위치는 형태소 구조, 어류, 음절 무게에 따라 결정됩니다.",source:"\"English has <span class='kw2'>variable stress</span>... any syllable can carry stress: <span class='kw2'>ˈarticle</span>(1st), <span class='kw2'>toˈmato</span>(2nd), <span class='kw2'>kangarˈoo</span>(3rd).\" (Yavaş 2011)",compare:[{title:"Variable stress (영어)",desc:"어느 음절이나 가능 · 가변적"},{title:"Fixed stress 예",desc:"체코(1st) · 폴란드(penult) · 프랑스(last)"}]},
  {src:"Secondary Stress",cat:"2음절 secondary",text:"<span class='kw3'>Secondary stress</span>는 항상 <span class='kw2'>3음절 이상</span> 단어에서만 나타난다.",ans:false,correct:"일부 2음절 단어도 두 음절 모두 강세를 받는다 — e.g. <span class='kw2'>ˈcáshˌew, ˌbamˈboo</span>.",why:"Yavaş는 대부분의 secondary stress가 3음절 이상 단어에서 나타나지만, 일부 2음절 단어도 두 가지 패턴(primary→secondary: cashew, crayon / secondary→primary: bamboo, sardine)으로 두 강세가 공존한다고 설명합니다.",source:"\"While secondary stresses are generally in longer words (three syllables+), there are some disyllabic words with both syllables stressed.\" (Yavaş 2011)",compare:[{title:"Primary→Secondary",desc:"<span class='kw2'>ˈcásh·ew, ˈcráy·on</span>"},{title:"Secondary→Primary",desc:"<span class='kw2'>ˌbam·ˈboo, ˌsar·ˈdine</span>"}]},
  {src:"Primary Stress",cat:"강세의 음향 특성",text:"강세 음절은 비강세 음절보다 <span class='kw2'>더 길고, 더 크고, 더 높다</span>.",ans:true,correct:"정확하다. 강세는 <span class='kw2'>duration(길이), loudness(크기), pitch(높이)</span> 세 가지 면에서 비강세 음절을 능가한다.",why:"Stress의 음향 속성 세 가지: (a) loudness, (b) duration, (c) pitch. 영어에서는 이 중 pitch가 가장 중요한 지각 단서(Fry 1955). 화자 측면에서는 조음 노력 증가, 청자 측면에서는 지각적 현저성으로 나타납니다.",source:"\"Stressed syllables: (a) louder, (b) longer in duration, (c) higher in pitch than unstressed syllables.\" (Yavaş 2011, Ch.1 & Ch.7)",compare:[{title:"Loudness",desc:"강세 > 비강세"},{title:"Duration",desc:"강세 > 비강세"},{title:"<span class='kw2'>Pitch</span>",desc:"강세 > 비강세 · <span class='kw2'>핵심 단서</span>"}]},
  {src:"Secondary Stress",cat:"photography vs photographic",text:"<span class='kw3'>photography</span> /fəˈtɑgrəfi/에는 <span class='kw2'>secondary stress가 있다</span>.",ans:false,correct:"<span class='kw3'>photography</span>에는 primary stress 하나만 있다. Secondary stress는 <span class='kw3'>photographic</span>의 첫 음절(pho-)에 나타난다.",why:"photography에는 두드러진 음절이 단 하나(-tog-)이므로 secondary 없이 primary만 존재합니다. 수치 표기: photography=4 1 4 3, photographic=2 4 1 4. 이 차이가 임용 기출 단골 포인트입니다.",source:"\"In <span class='kw3'>photography</span>: one prominent syllable → only primary. In <span class='kw3'>photographic</span>: two prominent syllables → primary + secondary.\" (Yavaş 2011)",compare:[{title:"photography",desc:"4 <span class='kw2'>1</span> 4 3 · primary 1개"},{title:"photographic",desc:"<span class='kw3'>2</span> 4 <span class='kw2'>1</span> 4 · sec+primary"}]},
  {src:"Primary Stress",cat:"강세의 정의",text:"강세(stress)는 <span class='kw2'>음절의 두드러짐(syllable prominence)</span>으로 정의할 수 있다.",ans:true,correct:"정확하다. 강세 = syllable prominence. 해당 음절이 주변 음절보다 loudness, duration, pitch 면에서 두드러지는 현상.",why:"Yavaş의 정의: 'Stress can be defined as syllable prominence.' 화자 측면에서는 조음 노력의 증가, 청자 측면에서는 지각적 현저성(perceptual prominence)으로 경험됩니다.",source:"\"<span class='kw2'>Stress can be defined as syllable prominence</span>. The prominence of a stressed syllable over an unstressed one may be due to loudness, duration, and pitch.\" (Yavaş 2011)",compare:[{title:"화자 측면",desc:"<span class='kw2'>조음 노력 증가</span>"},{title:"청자 측면",desc:"<span class='kw2'>지각적 현저성</span>"}]},
  {src:"Primary Stress",cat:"Mobile Stress",text:"영어 강세는 <span class='kw2'>mobile(이동 가능)</span>하여 파생어에서 강세 위치가 변할 수 있다.",ans:true,correct:"정확하다. democrat(1st) → democracy(2nd) → democratic(3rd)처럼 파생 과정에서 강세가 이동한다.",why:"Mobile stress의 대표 예: photograph(1st) → photography(2nd) → photographic(3rd+1st). 접미사에 따라 강세 위치가 변하는 이 현상은 임용 기출의 핵심 주제입니다.",source:"\"In addition to variability, English stress is said to be <span class='kw2'>mobile</span>: the stress shifts in morphologically related words. e.g. <span class='kw2'>ˈdemocrat → deˈmocracy → ˌdemoˈcratic</span>.\" (Yavaş 2011)",compare:[{title:"ˈphotograph",desc:"primary 1번째"},{title:"phoˈtography",desc:"primary 2번째"},{title:"ˌphoˈtographic",desc:"primary 3rd + sec 1st"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
</body>
