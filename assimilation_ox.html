<script>
const SAVE_KEY='ox_phon_assim_v1';
const TOTAL=15;
let cur=0,answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Assimilation",cat:"방향 — Regressive",text:"<span class='kw1'>Regressive assimilation</span>에서 <span class='kw2'>뒤 음</span>이 앞 음에 영향을 준다.",ans:true,correct:"정확하다. Regressive assimilation = 뒤 음 → 앞 음 방향. 앞 음이 뒤 음의 특성에 동화된다.",why:"Regressive assimilation(역행 동화)은 뒤에 오는 음이 앞에 오는 음에 영향을 미쳐, 앞 음이 뒤 음을 닮아가는 현상입니다. 'ten boys'에서 /n/ → [m]이 되는 것이 전형적인 예입니다. 뒤의 /b/(bilabial)가 앞의 /n/을 bilabial인 [m]으로 바꿉니다.",source:"\"In <span class='kw1'>regressive assimilation</span>, a sound becomes more like a following sound.\" (Yavaş 2011)",compare:[{title:"Regressive (역행)",desc:"뒤→앞 방향 · 영어에서 더 흔함"},{title:"Progressive (순행)",desc:"앞→뒤 방향 · 앞 음이 뒤 음에 영향"}]},
  {src:"Assimilation",cat:"방향 — 영어 빈도",text:"영어에서는 <span class='kw3'>Progressive assimilation</span>이 더 흔하다.",ans:false,correct:"영어에서는 <span class='kw1'>Regressive assimilation</span>이 더 흔하다. Progressive는 상대적으로 드물다.",why:"영어의 동화 현상 대부분은 뒤에 오는 음이 앞에 오는 음에 영향을 미치는 regressive(역행) 방향입니다. Place assimilation(ten boys, ten girls, ten keys)과 같이 조음 위치 동화가 대표적입니다. Progressive assimilation은 영어에서 드문 편입니다.",source:"\"<span class='kw1'>Regressive assimilation</span> is more common in English than progressive assimilation.\" (Yavaş 2011)",compare:[{title:"Regressive (역행)",desc:"영어에서 더 흔함 · 뒤→앞"},{title:"Progressive (순행)",desc:"영어에서 드묾 · 앞→뒤"}]},
  {src:"Assimilation",cat:"정도 — Total",text:"<span class='kw1'>Total assimilation</span>에서 두 음이 완전히 같아진다.",ans:true,correct:"정확하다. Total assimilation = 영향을 받는 음이 인접 음과 <span class='kw2'>완전히 동일</span>해지는 현상.",why:"Total assimilation(완전 동화)에서는 동화의 결과로 두 음이 완전히 같아집니다. 예를 들어 라틴어에서 in- + legalis → illegalis처럼, 원래 다른 두 음이 동화를 통해 동일한 음이 됩니다. 영어에서도 일부 비격식 발화에서 나타납니다.",source:"\"In <span class='kw1'>total assimilation</span>, the assimilated segment becomes identical to the conditioning segment.\" (Yavaş 2011)",compare:[{title:"Total assimilation",desc:"두 음이 완전히 동일 · /n/ → [m] before /m/"},{title:"Partial assimilation",desc:"일부 feature만 공유 · /n/ → [m] before /b/"}]},
  {src:"Assimilation",cat:"정도 — Partial",text:"<span class='kw3'>Partial assimilation</span>은 동화 실패가 아니라 일부 feature만 같아지는 것이다.",ans:true,correct:"정확하다. Partial assimilation = 모든 feature가 아닌 <span class='kw2'>일부 feature</span>만 인접 음과 같아지는 현상. 이것은 동화의 정상적인 결과다.",why:"Partial assimilation(부분 동화)은 동화가 '불완전하게' 일어난 게 아니라, 인접 음의 특정 feature(예: place of articulation)만 공유하는 현상입니다. 예: 'ten boys'에서 /n/ → [m]: nasal feature는 유지하고 place만 bilabial로 바뀜.",source:"\"In <span class='kw1'>partial assimilation</span>, only some features of the conditioning segment are shared with the assimilated segment.\" (Yavaş 2011)",compare:[{title:"Partial assimilation",desc:"일부 feature 공유 · nasal 유지 + place 변화"},{title:"Total assimilation",desc:"모든 feature 공유 · 두 음이 완전히 동일"}]},
  {src:"Assimilation",cat:"종류 — Place",text:"<span class='kw1'>Place assimilation</span>은 <span class='kw2'>조음 위치(place of articulation)</span> feature의 동화다.",ans:true,correct:"정확하다. Place assimilation = 한 음이 인접 음의 <span class='kw2'>조음 위치 feature</span>를 닮아가는 동화.",why:"Place assimilation(조음 위치 동화)은 영어에서 가장 흔한 동화 유형 중 하나입니다. 영어의 /n/은 뒤에 오는 자음의 조음 위치에 따라 [m](bilabial), [n](alveolar), [ŋ](velar)으로 실현됩니다. 이것이 place assimilation의 전형적인 예입니다.",source:"\"<span class='kw1'>Place assimilation</span>: a sound takes on the place of articulation features of an adjacent sound.\" (Yavaş 2011)",compare:[{title:"Place assimilation",desc:"조음 위치 동화 · /n/ → [m]/[ŋ]"},{title:"Voice assimilation",desc:"유성성 동화 · -s → [s]/[z]"},{title:"Manner assimilation",desc:"조음 방법 동화 · nasal/stop etc."}]},
  {src:"Assimilation",cat:"Place — 예시",text:"'ten boys'에서 <span class='kw1'>/n/ → [m]</span>으로 바뀌는 것은 <span class='kw3'>Place assimilation</span>이다.",ans:true,correct:"정확하다. /b/는 bilabial 자음이므로, 앞의 /n/이 같은 조음 위치인 bilabial [m]으로 동화된다.",why:"'ten boys'에서 /n/은 뒤에 오는 /b/(bilabial)의 조음 위치를 닮아 bilabial nasal [m]으로 실현됩니다. 이것은 Regressive place assimilation의 전형적인 예입니다. Regressive인 이유: 뒤의 /b/가 앞의 /n/에 영향을 줍니다.",source:"\"ten boys: /n/ → [m] / __ [b] — regressive place assimilation (bilabial).\" (Yavaş 2011)",compare:[{title:"ten boys [m]",desc:"/b/ bilabial → /n/ → [m] bilabial"},{title:"ten girls [ŋ]",desc:"/g/ velar → /n/ → [ŋ] velar"},{title:"ten keys [ŋ]",desc:"/k/ velar → /n/ → [ŋ] velar"}]},
  {src:"Assimilation",cat:"Place vs. Voice",text:"'ten girls'에서 <span class='kw1'>/n/ → [ŋ]</span>이 되는 것은 <span class='kw4'>Voice assimilation</span>이다.",ans:false,correct:"틀렸다. 이것은 <span class='kw3'>Place assimilation</span>이다. /g/는 velar 자음이므로 /n/이 velar [ŋ]으로 동화된다.",why:"'ten girls'에서 /n/ → [ŋ]은 뒤의 /g/(velar)의 조음 위치에 동화되는 Place assimilation입니다. Voice assimilation이 아닌 이유: /n/과 /g/ 둘 다 voiced이므로 유성성 변화가 없습니다. 오직 조음 위치(alveolar → velar)만 변합니다.",source:"\"ten girls: /n/ → [ŋ] / __ [g] — regressive <span class='kw1'>place</span> assimilation (velar), not voice.\" (Yavaş 2011)",compare:[{title:"Place assimilation",desc:"조음 위치 변화 · alveolar → velar"},{title:"Voice assimilation",desc:"유성성 변화 · /s/ → [z]"}]},
  {src:"Assimilation",cat:"방향 — Progressive",text:"<span class='kw3'>Progressive assimilation</span>에서 <span class='kw2'>앞 음</span>이 뒤 음에 영향을 준다.",ans:true,correct:"정확하다. Progressive assimilation = 앞 음 → 뒤 음 방향. 뒤 음이 앞 음의 특성을 닮아간다.",why:"Progressive assimilation(순행 동화)은 앞에 오는 음이 뒤에 오는 음에 영향을 미쳐, 뒤 음이 앞 음을 닮아가는 현상입니다. 예: 영어 복수형 -s가 /s/ 뒤에서 [s]로 유지되는 경우 (cats: /t/ → [s] 유지).",source:"\"In <span class='kw3'>progressive assimilation</span>, a sound becomes more like a preceding sound.\" (Yavaş 2011)",compare:[{title:"Progressive (순행)",desc:"앞→뒤 방향 · 앞 음이 뒤 음에 영향"},{title:"Regressive (역행)",desc:"뒤→앞 방향 · 뒤 음이 앞 음에 영향"}]},
  {src:"Assimilation",cat:"Voice — 복수형 -s",text:"영어 복수형 -s의 <span class='kw1'>[s]/[z]</span> 교체는 <span class='kw3'>Voice assimilation</span>이다.",ans:true,correct:"정확하다. 복수형 -s는 앞 음의 유성성을 닮아 무성 환경에서 [s], 유성 환경에서 [z]로 실현된다.",why:"영어 복수형 -s의 [s]/[z] 교체는 Voice assimilation의 전형적인 예입니다. 앞 자음이 무성(cats: /t/ → [s])이면 -s도 무성, 앞 자음이 유성(dogs: /g/ → [z])이면 -s도 유성이 됩니다. 이것은 Progressive voice assimilation입니다.",source:"\"The [s]/[z] alternation in English plural -s is a case of <span class='kw3'>progressive voice assimilation</span>.\" (Yavaş 2011)",compare:[{title:"cats [s]",desc:"무성 /t/ 뒤 → -s도 무성 [s]"},{title:"dogs [z]",desc:"유성 /g/ 뒤 → -s도 유성 [z]"}]},
  {src:"Assimilation",cat:"정의",text:"동화(assimilation)는 인접 음이 서로 <span class='kw2'>더 유사해지는(more similar)</span> 현상이다.",ans:true,correct:"정확하다. Assimilation = 인접한 음들이 서로를 닮아 유사해지는 음운 현상.",why:"동화(assimilation)의 핵심 정의는 '인접 음들이 서로를 닮아 유사해지는 것'입니다. 동화를 통해 조음 위치, 유성성, 조음 방법 등의 feature를 공유하게 됩니다. 이는 조음의 편의(ease of articulation)를 위한 자연스러운 음운 과정입니다.",source:"\"<span class='kw1'>Assimilation</span>: a process whereby adjacent sounds become more similar to each other.\" (Yavaş 2011)",compare:[{title:"Assimilation",desc:"인접 음이 서로 유사해짐"},{title:"Dissimilation",desc:"인접 음이 서로 달라짐 (반대 방향)"}]},
  {src:"Assimilation",cat:"Place — 방향",text:"Place assimilation은 <span class='kw4'>Progressive</span> 방향이다.",ans:false,correct:"틀렸다. 영어의 Place assimilation은 <span class='kw1'>Regressive</span> 방향이다. 뒤 자음의 조음 위치가 앞 /n/을 동화시킨다.",why:"영어에서 Place assimilation은 뒤에 오는 자음의 조음 위치가 앞의 /n/을 동화시키는 Regressive(역행) 방향입니다. ten boys, ten girls, ten keys 모두 뒤의 /b/, /g/, /k/의 조음 위치가 앞의 /n/에 영향을 줍니다.",source:"\"English place assimilation is <span class='kw1'>regressive</span>: the following consonant's place features spread to the preceding /n/.\" (Yavaş 2011)",compare:[{title:"Place assimilation 방향",desc:"Regressive (뒤→앞)"},{title:"Voice assimilation 방향",desc:"Progressive (앞→뒤) · 복수형 -s"}]},
  {src:"Assimilation",cat:"Place — ten people",text:"'ten people'에서 <span class='kw1'>/n/ → [m]</span>인 이유는 bilabial 자음 <span class='kw2'>/p/</span>가 뒤에 오기 때문이다.",ans:true,correct:"정확하다. /p/는 bilabial 자음이므로, /n/이 bilabial nasal [m]으로 동화된다 — Place assimilation.",why:"'ten people'에서 /n/ → [m]은 뒤에 오는 /p/(bilabial stop)의 조음 위치에 동화되는 regressive place assimilation입니다. /p/와 /b/ 모두 bilabial이므로 /n/ → [m]이 됩니다. ten boys(/b/)와 동일한 원리입니다.",source:"\"ten people: /n/ → [m] / __ [p] — regressive place assimilation (bilabial /p/).\" (Yavaş 2011)",compare:[{title:"ten people [m]",desc:"/p/ bilabial → /n/ → bilabial [m]"},{title:"ten boys [m]",desc:"/b/ bilabial → /n/ → bilabial [m]"}]},
  {src:"Assimilation",cat:"정도 분류",text:"Total assimilation과 Partial assimilation은 동화의 <span class='kw2'>'정도(degree)'</span>에 따른 분류다.",ans:true,correct:"정확하다. Total/Partial은 동화의 <span class='kw2'>정도(degree)</span>에 따른 분류. 방향(progressive/regressive)과는 다른 차원의 분류.",why:"동화는 두 가지 차원으로 분류됩니다: (1) 방향 — progressive vs. regressive, (2) 정도 — total vs. partial. Total은 완전히 같아지는 것, Partial은 일부 feature만 같아지는 것입니다. 이 두 차원은 독립적으로 적용됩니다.",source:"\"Assimilation classified by <span class='kw2'>degree</span>: total (identical) vs. partial (some features shared). By direction: progressive vs. regressive.\" (Yavaş 2011)",compare:[{title:"방향에 따른 분류",desc:"Progressive vs. Regressive"},{title:"정도에 따른 분류",desc:"Total vs. Partial"}]},
  {src:"Assimilation",cat:"종류 — Manner",text:"<span class='kw1'>Manner assimilation</span>은 <span class='kw2'>조음 방법(manner of articulation)</span> feature의 동화다.",ans:true,correct:"정확하다. Manner assimilation = 한 음이 인접 음의 <span class='kw2'>조음 방법 feature</span>를 닮아가는 동화.",why:"Manner assimilation(조음 방법 동화)은 stop, fricative, nasal, lateral 등의 조음 방법 feature가 동화되는 현상입니다. 예를 들어, 어떤 음이 인접 nasal의 영향으로 비음화(nasalization)되는 것이 Manner assimilation의 한 유형입니다.",source:"\"<span class='kw1'>Manner assimilation</span>: a sound takes on the manner of articulation features of an adjacent sound.\" (Yavaş 2011)",compare:[{title:"Manner assimilation",desc:"조음 방법 동화 · nasal/stop 등"},{title:"Place assimilation",desc:"조음 위치 동화 · bilabial/velar 등"},{title:"Voice assimilation",desc:"유성성 동화 · voiced/voiceless"}]},
  {src:"Assimilation",cat:"Place — ten keys",text:"'ten keys'에서 <span class='kw1'>/n/ → [ŋ]</span>이다.",ans:true,correct:"정확하다. /k/는 velar 자음이므로 앞의 /n/이 velar nasal [ŋ]으로 동화된다 — regressive place assimilation.",why:"'ten keys'에서 /k/(velar stop)가 앞의 /n/(alveolar nasal)에 영향을 주어 [ŋ](velar nasal)으로 동화됩니다. /k/와 /g/ 모두 velar이므로 ten keys와 ten girls에서 동일하게 /n/ → [ŋ]이 됩니다.",source:"\"ten keys: /n/ → [ŋ] / __ [k] — regressive place assimilation (velar /k/).\" (Yavaş 2011)",compare:[{title:"ten keys [ŋ]",desc:"/k/ velar → /n/ → velar [ŋ]"},{title:"ten girls [ŋ]",desc:"/g/ velar → /n/ → velar [ŋ]"},{title:"ten boys [m]",desc:"/b/ bilabial → /n/ → bilabial [m]"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
</body>
</html>
