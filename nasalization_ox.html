<script>
const SAVE_KEY='ox_phon_nasal_v1';
const TOTAL=15;
let cur=0,answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Nasalization",cat:"변이음 규칙",text:"영어에서 모음의 비음화(nasalization)는 <span class='kw1'>변이음(allophonic)</span> 규칙이다.",ans:true,correct:"정확하다. 영어에서 비음화된 모음과 비음화되지 않은 모음은 <span class='kw2'>의미 구별이 없으므로</span> 변이음 규칙(allophonic rule)이다.",why:"변이음 규칙(allophonic rule)은 의미 구별 없이 특정 환경에서 자동으로 적용되는 음운 규칙이다. 영어에서 구강 모음과 비강 모음은 의미를 구별하지 못하므로(최소 대립쌍 없음), 비음화는 음소 규칙이 아닌 변이음 규칙이다.",source:"\"Nasalization in English is an <span class='kw1'>allophonic rule</span>: oral and nasal vowels do not contrast (no minimal pairs).\" (Yavaş 2011)",compare:[{title:"변이음 규칙 (영어 비음화)",desc:"의미 구별 없음 · 환경 조건부 자동 적용"},{title:"음소 규칙",desc:"의미 구별 있음 · 불어 등의 비음화"}]},
  {src:"Nasalization",cat:"비음화 환경",text:"비음화는 모음이 <span class='kw2'>비음(nasal) 앞</span>에서 일어난다.",ans:true,correct:"정확하다. 비음화 규칙: <span class='kw2'>V → [+nasal] / __ [+nasal]</span> — 모음이 비음 자음 앞에서 비음화된다.",why:"비음화의 음운 규칙: 모음은 후행하는 비음 자음(/m, n, ŋ/) 앞 환경에서 비음화된다. 이는 Regressive assimilation(역행 동화): 뒤의 비음 자음이 앞의 모음에 영향을 준다. 예: man /mæ̃n/에서 /æ/가 /n/ 앞에서 비음화된다.",source:"\"Nasalization rule: V → [+nasal] / __ [+nasal]: vowels are nasalized <span class='kw2'>before</span> a nasal consonant.\" (Yavaş 2011)",compare:[{title:"비음화 환경",desc:"V → [+nasal] / __ N · 비음 앞"},{title:"구강화 환경",desc:"비음 자음 없을 때 · 구강 모음 유지"}]},
  {src:"Nasalization",cat:"IPA 표기",text:"비음화 기호는 모음 위에 <span class='kw2'>[~]</span>으로 표기한다 — 예: <span class='kw1'>[æ̃]</span>.",ans:true,correct:"정확하다. IPA에서 비음화된 모음은 해당 모음 기호 위에 <span class='kw2'>물결 기호(~, tilde)</span>를 붙여 표기한다 — 예: [æ̃], [ẽ], [ã].",why:"IPA 비음화 표기: 모음 기호 위에 diacritic tilde(~)를 붙인다. man의 /æ/가 비음화되면 [æ̃]로 표기한다. 이 표기법을 IPA 규정대로 정확히 알아야 한다.",source:"\"Nasalized vowels are transcribed with a <span class='kw2'>tilde</span> above the vowel symbol: <span class='kw1'>[æ̃]</span> (nasalized /æ/).\" (Yavaş 2011)",compare:[{title:"비음화 모음 표기",desc:"[æ̃] [ẽ] [ã] — 모음 위 tilde"},{title:"구강 모음 표기",desc:"[æ] [e] [a] — tilde 없음"}]},
  {src:"Nasalization",cat:"예시: man",text:"'<span class='kw1'>man</span>'의 /æ/는 /n/ 앞에서 비음화된다.",ans:true,correct:"정확하다. 'man'에서 /æ/는 후행 비음 /n/ 앞 환경에서 <span class='kw2'>[æ̃]</span>로 비음화된다.",why:"man /mæn/: 모음 /æ/는 비음 /n/ 바로 앞에 위치하므로 비음화 규칙이 적용된다. 표면형: [mæ̃n]. 비음화 방향은 역행: 뒤의 /n/이 앞의 /æ/를 비음화시킨다.",source:"\"'man': /æ/ → <span class='kw2'>[æ̃]</span> before /n/ (nasalization rule applies).\" (Yavaş 2011)",compare:[{title:"'man' [mæ̃n]",desc:"/æ/ → [æ̃] · 비음 /n/ 앞"},{title:"'mat' [mæt]",desc:"/æ/ → [æ] · 비음 없음 · 비음화 없음"}]},
  {src:"Nasalization",cat:"동화 방향",text:"비음화는 <span class='kw1'>Progressive(순행)</span> 방향이다.",ans:false,correct:"틀렸다. 비음화는 <span class='kw2'>Regressive(역행)</span> 동화 방향이다 — 뒤의 비음 자음이 앞의 모음에 영향을 준다.",why:"비음화 규칙: V → [+nasal] / __ [+nasal]. 규칙 환경에서 비음 자음(오른쪽)이 선행 모음(왼쪽)의 조음에 영향을 미친다. 이는 뒤에서 앞으로 영향이 미치는 Regressive assimilation(역행 동화)이다.",source:"\"Nasalization is <span class='kw2'>regressive assimilation</span>: the nasal consonant (right) affects the preceding vowel (left). ← direction.\" (Yavaş 2011)",compare:[{title:"Regressive assimilation (비음화)",desc:"뒤 자음 → 앞 모음 영향 (← 방향)"},{title:"Progressive assimilation",desc:"앞 요소 → 뒤 요소 영향 (→ 방향)"}]},
  {src:"Nasalization",cat:"음소 vs 변이음",text:"영어에서 구강 모음과 비강 모음은 의미를 구별한다.",ans:false,correct:"틀렸다. 영어에서 구강 모음과 비강 모음은 의미를 구별하지 <span class='kw2'>않는다</span> — 최소 대립쌍이 없으므로 변이음 관계.",why:"불어에서는 beau /bo/(잘생긴)와 bon /bõ/(좋은)처럼 비음화가 의미를 구별한다. 그러나 영어에서는 구강 모음과 비강 모음이 의미 대립을 이루는 최소 대립쌍이 없다. 따라서 영어 비음화는 음소 규칙이 아닌 변이음 규칙이다.",source:"\"In English, oral and nasal vowels are <span class='kw2'>allophones</span> (no minimal pairs). In French, they are <span class='kw2'>phonemes</span> (beau vs bon).\" (Yavaş 2011)",compare:[{title:"영어 비음화 (변이음)",desc:"최소 대립쌍 없음 · 의미 구별 불가"},{title:"불어 비음화 (음소)",desc:"beau /bo/ vs bon /bõ/ · 의미 구별"}]},
  {src:"Epenthesis",cat:"삽입 규칙 정의",text:"<span class='kw1'>Epenthesis</span>는 음 삽입(segment insertion) 규칙이다.",ans:true,correct:"정확하다. <span class='kw1'>Epenthesis</span>(삽입)는 기저형에 없는 새로운 분절음(segment)을 표면형에 삽입하는 음운 규칙이다.",why:"Epenthesis: 음소 연쇄에서 발음상 어려운 구조를 회피하기 위해 새 분절음을 삽입하는 규칙이다. 영어의 대표 예: 복수 형태소 /ɪz/ 삽입(buses), 과거 형태소 /ɪd/ 삽입(wanted).",source:"\"<span class='kw1'>Epenthesis</span> is a phonological rule that <span class='kw2'>inserts</span> a segment not present in the underlying representation.\" (Yavaş 2011)",compare:[{title:"Epenthesis (삽입)",desc:"∅ → /ɪ/ / 자음군 회피 목적"},{title:"Deletion (삭제)",desc:"분절음 → ∅ · 반대 방향 규칙"}]},
  {src:"Epenthesis",cat:"복수 /ɪz/",text:"복수형 <span class='kw1'>/ɪz/</span>는 epenthesis의 예다.",ans:true,correct:"정확하다. 복수 -s가 치찰음 뒤에서 /ɪz/로 실현되는 것은 <span class='kw2'>/ɪ/</span>가 삽입되는 epenthesis의 결과이다.",why:"치찰음으로 끝나는 어간에 -s를 바로 붙이면 같은 유형의 자음이 연속된다(buses: *[bʌss]). 이를 방지하기 위해 /ɪ/가 삽입되어 [bʌsɪz]가 된다. 이것이 epenthesis이다.",source:"\"Plural /ɪz/ (buses, judges) is an instance of <span class='kw1'>epenthesis</span>: /ɪ/ is inserted to break up the sibilant cluster.\" (Yavaş 2011)",compare:[{title:"Epenthesis 적용",desc:"bus+s → [bʌsɪz] · /ɪ/ 삽입"},{title:"Epenthesis 미적용",desc:"cat+s → [kæts] · /ɪ/ 삽입 없음"}]},
  {src:"Epenthesis",cat:"삭제와 대비",text:"<span class='kw1'>Epenthesis</span>와 <span class='kw1'>deletion</span>은 반대 방향의 규칙이다.",ans:true,correct:"정확하다. <span class='kw1'>Epenthesis</span>는 분절음 삽입(∅ → C/V), <span class='kw1'>deletion</span>은 분절음 삭제(C/V → ∅)로 반대 방향의 규칙이다.",why:"Epenthesis: ∅ → /ɪ/ (음 삽입). Deletion: /t/ → ∅ (음 삭제, 예: 'facts'의 /t/ 탈락). 두 규칙은 음운론에서 대칭적 관계에 있다. 둘 다 기저형과 표면형 간의 불일치를 만들어낸다.",source:"\"<span class='kw1'>Epenthesis</span>: ∅ → segment (insertion). <span class='kw1'>Deletion</span>: segment → ∅. They are opposite processes.\" (Yavaş 2011)",compare:[{title:"Epenthesis",desc:"∅ → /ɪ/ : buses, wanted"},{title:"Deletion",desc:"/t/ → ∅ : mus[t]ard, san[d]wich"}]},
  {src:"Nasalization",cat:"형식 규칙",text:"비음화 규칙의 공식 표기: <span class='kw2'>V → [+nasal] / __ [+nasal]</span>.",ans:true,correct:"정확하다. 비음화 규칙의 음운 규칙 공식: <span class='kw2'>V → [+nasal] / __ [+nasal]</span> — 비음 앞에서 모음이 비음화된다.",why:"음운 규칙 표기 읽는 법: V(모음)는 [+nasal] 자질을 획득한다, __[+nasal] 환경에서(비음 직전에). 규칙의 세 구성 요소: (1) 입력(V), (2) 출력([+nasal]V), (3) 환경(비음 앞).",source:"\"Nasalization rule: V → [+nasal] / __ [+nasal]: a vowel becomes nasal before a nasal segment.\" (Yavaş 2011)",compare:[{title:"규칙 읽기",desc:"V → [+nasal] / __ [+nasal]"},{title:"예시",desc:"man: /æ/ → [æ̃] / __ /n/"}]},
  {src:"Nasalization",cat:"규칙 지위",text:"영어 비음화는 <span class='kw4'>음소(phonemic)</span> 규칙이다.",ans:false,correct:"틀렸다. 영어 비음화는 <span class='kw2'>변이음(allophonic)</span> 규칙이다 — 비음화된 모음과 구강 모음이 의미를 구별하지 않는다.",why:"음소 규칙은 두 음이 의미를 구별할 때(불어 비음화 등). 변이음 규칙은 의미 구별 없이 환경에 따라 자동 적용될 때이다. 영어에서 구강모음과 비강모음은 최소 대립쌍을 이루지 않으므로 변이음 규칙이다.",source:"\"English nasalization is <span class='kw2'>allophonic</span>, not phonemic: [æ] and [æ̃] are allophones of the same phoneme /æ/.\" (Yavaş 2011)",compare:[{title:"Allophonic (영어)",desc:"[æ] / [æ̃] = 같은 음소의 변이음"},{title:"Phonemic (불어)",desc:"/o/ / /õ/ = 서로 다른 음소"}]},
  {src:"Nasalization",cat:"예시: can",text:"'<span class='kw1'>can</span>'의 /æ/는 /n/ 앞에서 <span class='kw2'>[æ̃]</span>로 실현된다.",ans:true,correct:"정확하다. 'can'의 /æ/는 비음 /n/ 앞 환경에서 비음화 규칙 적용으로 <span class='kw2'>[æ̃]</span>로 실현된다.",why:"can /kæn/: /æ/는 후행 비음 /n/ 앞에서 비음화된다. 표면형: [kæ̃n]. man, ban, tan 등 비음으로 끝나는 CVC 구조에서 동일하게 비음화가 적용된다.",source:"\"'can' /kæn/ → [<span class='kw2'>kæ̃n</span>]: /æ/ nasalized before /n/.\" (Yavaş 2011)",compare:[{title:"'can' [kæ̃n]",desc:"/æ/ → [æ̃] · 비음 /n/ 앞"},{title:"'cat' [kæt]",desc:"/æ/ → [æ] · 비음 없음 · 구강 실현"}]},
  {src:"Epenthesis",cat:"자음군 단순화",text:"<span class='kw1'>Epenthesis</span>는 자음군(consonant cluster)을 단순화하기 위해 모음을 삽입한다.",ans:true,correct:"정확하다. Epenthesis의 주요 기능 중 하나는 발음하기 어려운 자음군을 회피하기 위해 모음을 삽입하는 것이다.",why:"영어에서 치찰음+치찰음 연속(*[bʌss])은 발음상 어렵다. 이를 회피하기 위해 /ɪ/가 삽입된다([bʌsɪz]). 이것이 epenthesis의 핵심 기능이다. 마찬가지로 /t,d/+/t,d/ 연속에서도 /ɪ/가 삽입된다(wanted, needed).",source:"\"<span class='kw1'>Epenthesis</span> inserts a vowel to break up difficult consonant sequences: *[bʌss] → [bʌsɪz].\" (Yavaş 2011)",compare:[{title:"치찰음 연속 회피",desc:"bus+s: *[bʌss] → [bʌsɪz]"},{title:"/t,d/ 연속 회피",desc:"want+d: *[wɑntd] → [ˈwɑntɪd]"}]},
  {src:"Nasalization",cat:"최소 대립쌍",text:"비음화된 모음과 비음화되지 않은 모음은 영어에서 최소 대립쌍을 이룬다.",ans:false,correct:"틀렸다. 영어에서 비음화 모음과 구강 모음은 <span class='kw2'>최소 대립쌍을 이루지 않는다</span> — 따라서 변이음 관계이다.",why:"최소 대립쌍(minimal pair): 하나의 분절음 차이만으로 의미가 구별되는 단어 쌍. 영어에서 [æ]/[æ̃] 차이로 의미가 달라지는 최소 대립쌍은 없다. 이것이 영어 비음화가 변이음 규칙인 이유이다.",source:"\"English nasal and oral vowels are NOT in minimal pairs: no English words differ <span class='kw2'>only</span> in vowel nasality with a meaning contrast.\" (Yavaş 2011)",compare:[{title:"영어: 최소 대립쌍 없음",desc:"[æ] / [æ̃] → 변이음 · 의미 동일"},{title:"불어: 최소 대립쌍 있음",desc:"/a/ / /ã/ → 음소 · 의미 다름"}]},
  {src:"Nasalization",cat:"동화 분류",text:"비음화는 <span class='kw1'>Regressive assimilation</span>의 일종이다.",ans:true,correct:"정확하다. 비음화는 후행 비음 자음이 선행 모음에 영향을 주는 <span class='kw2'>Regressive(역행) assimilation</span>이다.",why:"비음화 방향: 후행 비음 자음(/n, m, ŋ/) → 선행 모음. 뒤에서 앞으로 영향이 미치므로 역행 동화이다. 규칙: V → [+nasal] / __ [+nasal]. /man/에서 /n/이 선행 /æ/를 비음화시킨다.",source:"\"Nasalization is a type of <span class='kw2'>regressive assimilation</span>: the following nasal consonant influences the preceding vowel.\" (Yavaş 2011)",compare:[{title:"Regressive assimilation",desc:"후행 요소 → 선행 요소 영향 (← 방향)"},{title:"비음화 예",desc:"[mæ̃n]: /n/ → /æ/ 비음화"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
</body>
</html>
