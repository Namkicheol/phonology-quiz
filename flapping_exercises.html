<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flapping — 실전 Exercise | Phonology</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#1a5276; --pri-l:#eaf3fb; --acc:#e8533a;
  --grn:#1a6e42; --grn-bg:#eaf6f0;
  --red-bg:#fdf0ed; --bdr:#aed6f1; --gray:#f4f9fe;
  --txt:#1a1a2e; --mut:#666;
  --serif:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--txt);background:#fff;line-height:1.9}

.hero{background:#0e2f44;color:#fff;padding:48px 24px 40px;text-align:center}
.hero-tag{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.5);margin-bottom:12px;font-family:var(--mono);text-transform:uppercase}
.hero h1{font-family:var(--serif);font-size:26px;margin-bottom:10px;line-height:1.35}
.hero h1 span{color:#ffd166}
.hero p{font-size:13px;color:rgba(255,255,255,.6);max-width:480px;margin:0 auto 20px}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap}
.stat-n{font-family:var(--mono);font-size:22px;font-weight:600;color:#ffd166}
.stat-l{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}

.sbar{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1px solid var(--bdr);
  padding:10px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.06)}
.sbar-lbl{font-size:12px;color:var(--mut)}
.sbar-num{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--pri)}
.prog-wrap{flex:1;max-width:180px;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--pri);border-radius:3px;transition:width .4s}
.rbtn{margin-left:auto;padding:5px 13px;border:1px solid var(--bdr);border-radius:6px;
  font-size:12px;color:var(--mut);cursor:pointer;font-family:var(--sans);background:#fff;
  transition:all .15s}
.rbtn:hover{border-color:var(--pri);color:var(--pri)}

.wrap{max-width:760px;margin:0 auto;padding:28px 20px 60px}

.ex-sec{margin-top:44px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--pri)}
.ex-sec-tag{font-family:var(--mono);font-size:10px;color:var(--mut);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.ex-sec-title{font-family:var(--serif);font-size:19px;color:var(--pri)}
.ex-sec-desc{font-size:13px;color:var(--mut);margin-top:4px;line-height:1.6;font-style:italic}

.qcard{background:#fff;border:1.5px solid var(--bdr);border-radius:12px;padding:20px 22px;
  margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
.qcard:hover{box-shadow:0 2px 10px rgba(26,82,118,.08)}
.qcard.ok{border-color:#6dbf9a;background:#f8fdf9}
.qcard.ng{border-color:#e8a090;background:#fdf8f7}

.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.qnum{font-family:var(--mono);font-size:11px;color:var(--mut)}
.qtag{font-size:11px;padding:3px 9px;border-radius:10px;font-family:var(--mono)}
.qtag.ox{background:#eef0ff;color:var(--pri)}
.qtag.mc{background:var(--grn-bg);color:var(--grn)}
.qtag.fi{background:#fffbe0;color:#7a6000}

.qtext{font-size:14px;line-height:1.9;color:var(--txt);margin-bottom:13px;white-space:pre-line}
.qeng{font-family:var(--mono);font-size:13px;color:#2a2a3e;background:var(--gray);
  border-left:3px solid var(--pri);padding:9px 13px;border-radius:0 7px 7px 0;
  display:block;margin:6px 0 13px;line-height:1.75;white-space:pre-line}

.ox-row{display:flex;gap:12px}
.ox-btn{flex:1;padding:13px;font-size:24px;border:1.5px solid var(--bdr);border-radius:10px;
  background:#fff;cursor:pointer;transition:all .15s;font-family:var(--sans)}
.ox-btn:hover:not([disabled]){border-color:var(--pri);background:var(--pri-l)}
.ox-btn.ok2{border-color:var(--grn)!important;background:var(--grn-bg)!important}
.ox-btn.ng2{border-color:var(--acc)!important;background:var(--red-bg)!important}

.mc-opts{display:flex;flex-direction:column;gap:8px}
.mc-btn{text-align:left;padding:10px 14px;font-size:13.5px;border:1.5px solid var(--bdr);
  border-radius:9px;background:#fff;cursor:pointer;font-family:var(--sans);
  line-height:1.65;transition:all .15s;color:var(--txt);white-space:pre-line}
.mc-btn:hover:not([disabled]){border-color:var(--pri);background:var(--pri-l)}
.mc-btn.ok2{border-color:var(--grn)!important;background:var(--grn-bg)!important;color:var(--grn)!important}
.mc-btn.ng2{border-color:var(--acc)!important;background:var(--red-bg)!important;color:var(--acc)!important}

.fi-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.fi-lbl{font-size:13px;color:var(--mut);min-width:120px;font-family:var(--mono)}
.fi-inp{flex:1;padding:8px 12px;border:1.5px solid var(--bdr);border-radius:7px;
  font-size:13px;font-family:var(--mono);color:var(--txt);transition:border-color .15s}
.fi-inp:focus{outline:none;border-color:var(--pri)}
.fi-inp.ok2{border-color:var(--grn);background:var(--grn-bg)}
.fi-inp.ng2{border-color:var(--acc);background:var(--red-bg)}
.fi-cfm{padding:8px 17px;background:var(--pri);color:#fff;border:none;border-radius:7px;
  font-size:13px;cursor:pointer;font-family:var(--sans);margin-top:6px;transition:opacity .15s}
.fi-cfm:hover{opacity:.85}

.fb{display:none;margin-top:12px;padding:13px 16px;border-radius:9px;
  font-size:13.5px;line-height:1.85;white-space:pre-line}
.fb.ok{background:var(--grn-bg);border:1px solid #90d0b0;color:#145535}
.fb.ng{background:var(--red-bg);border:1px solid #e0a090;color:#8a2010}
.fb-head{font-weight:700;margin-bottom:5px;font-size:14px}

.rbox{display:none;margin-top:40px;padding:32px 24px;background:var(--pri-l);
  border:1.5px solid #aed6f1;border-radius:16px;text-align:center}
.r-icon{font-size:38px;margin-bottom:10px}
.r-score{font-family:var(--serif);font-size:26px;color:var(--pri);font-weight:700;margin-bottom:6px}
.r-msg{font-size:14px;color:var(--mut);margin-bottom:18px}
.r-btn{padding:9px 26px;background:var(--pri);color:#fff;border:none;border-radius:8px;
  font-size:14px;cursor:pointer;font-family:var(--sans)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Phonology · Flapping</div>
  <h1>Flapping<br><span>실전 연습문제</span></h1>
  <p>Flapping 규칙 · /t,d/ → [ɾ] · OX / 객관식 / 빈칸 · 임용고시 대비</p>
  <div class="hero-stats">
    <div><div class="stat-n">3</div><div class="stat-l">섹션</div></div>
    <div><div class="stat-n">15</div><div class="stat-l">문제</div></div>
    <div><div class="stat-n">OX · MC · 빈칸</div><div class="stat-l">유형</div></div>
  </div>
</div>

<div class="sbar">
  <span class="sbar-lbl">맞은 문제</span>
  <span class="sbar-num"><span id="sc">0</span>&thinsp;/&thinsp;<span id="st">15</span></span>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <button class="rbtn" onclick="reset()">↺ 다시 풀기</button>
</div>

<div class="wrap">
  <div id="qw"></div>
  <div class="rbox" id="rb">
    <div class="r-icon" id="ri"></div>
    <div class="r-score" id="rs"></div>
    <div class="r-msg" id="rm"></div>
    <button class="r-btn" onclick="reset()">↺ 다시 풀기</button>
  </div>
</div>

<script>
const DATA = [
  {s:'Section A',st:'OX 확인 문제',
   sd:'다음 진술이 맞으면 O, 틀리면 X를 선택하시오.',
   t:'ox',
   q:"'butter'에서 /t/는 [ɾ]로 실현된다.",
   a:true,
   e:"✓ 정답. 미국 영어에서 'butter'의 /t/는 강세모음 /ʌ/ 뒤, 비강세모음 /ər/ 앞에 위치하므로 flapping 환경(V́ __ V)을 충족합니다. 발음: [ˈbʌɾər]."},

  {s:'Section A',st:'',sd:'',
   t:'ox',
   q:'Flapping은 /t/에만 적용되고 /d/에는 적용되지 않는다.',
   a:false,
   e:"✗ 오답. Flapping은 /t/와 /d/ 모두에 적용됩니다. 'betting'과 'bedding'이 미국 영어에서 둘 다 [ˈbɛɾɪŋ]으로 실현되는 것이 그 증거입니다."},

  {s:'Section A',st:'',sd:'',
   t:'ox',
   q:"'top'의 어두 /t/는 flapping된다.",
   a:false,
   e:"✗ 오답. 어두 /t/는 강세모음 앞(not after)에 위치하므로 flapping 환경이 아닙니다. Flapping의 필수 조건은 강세모음 '뒤'입니다. 'top'의 /t/는 오히려 aspiration([tʰ])이 일어납니다."},

  {s:'Section A',st:'',sd:'',
   t:'ox',
   q:"[ɾ]은 alveolar flap이다.",
   a:true,
   e:'✓ 정답. [ɾ]는 IPA에서 alveolar flap(치경 탄음)으로, 혀끝이 치경을 빠르게 한 번 두드리는 소리입니다. alveolar trill [r](반복 진동)과 구별해야 합니다.'},

  {s:'Section A',st:'',sd:'',
   t:'ox',
   q:'Flapping은 British English의 특징이다.',
   a:false,
   e:'✗ 오답. Flapping은 American English(미국 영어)의 특징입니다. 영국 영어(RP)에서는 /t,d/가 flapping되지 않습니다. 미국 영어의 water[ˈwɔɾər]와 영국 영어의 water[ˈwɔtə]를 비교해보세요.'},

  {s:'Section B',st:'객관식 문제',
   sd:'각 문항에서 올바른 답을 하나 선택하시오.',
   t:'mc',
   q:'Flapping 적용 환경은?',
   o:['① 어두 강세 모음 앞',
      '② 강세모음 뒤, 비강세모음 앞',
      '③ 어말',
      '④ /s/ 뒤'],
   a:1,
   e:'✓ 정답: ②. Flapping 환경: /t, d/ → [ɾ] / V́ __ V. 강세모음(V́) 뒤이면서 비강세모음(V) 앞이어야 합니다. 두 조건이 모두 충족되어야 flapping이 일어납니다.'},

  {s:'Section B',st:'',sd:'',
   t:'mc',
   q:"'butter'의 미국 영어 IPA 발음은?",
   o:["① [ˈbʌtər]",
      "② [ˈbʌɾər]",
      "③ [ˈbʌdər]",
      "④ [ˈbʌrər]"],
   a:1,
   e:"✓ 정답: ②. 미국 영어에서 'butter'는 [ˈbʌɾər]로 발음됩니다. /t/가 강세모음 /ʌ/ 뒤, 비강세모음 /ər/ 앞에서 flapping되어 [ɾ]가 됩니다."},

  {s:'Section B',st:'',sd:'',
   t:'mc',
   q:'Flapping의 결과음은?',
   o:['① [r]',
      '② [d]',
      '③ [ɾ]',
      '④ [t]'],
   a:2,
   e:'✓ 정답: ③. Flapping의 결과음은 [ɾ](alveolar flap)입니다. [r]은 alveolar trill(다른 기호), [d]는 voiced stop, [t]는 voiceless stop으로 flapping 결과음이 아닙니다.'},

  {s:'Section B',st:'',sd:'',
   t:'mc',
   q:'다음 중 Flapping이 적용되지 않는 단어는?',
   o:['① water',
      '② better',
      '③ top',
      '④ city'],
   a:2,
   e:"✓ 정답: ③. 'top'의 /t/는 어두에 위치하여 강세모음 앞(not after)이므로 flapping 환경이 아닙니다. water, better, city는 모두 강세모음 뒤, 비강세모음 앞의 flapping 환경을 충족합니다."},

  {s:'Section B',st:'',sd:'',
   t:'mc',
   q:'Flapping은 어떤 종류의 규칙인가?',
   o:['① Phonemic rule',
      '② Allophonic rule',
      '③ Morphophonemic rule',
      '④ Syntactic rule'],
   a:1,
   e:'✓ 정답: ②. Flapping은 allophonic rule(변이음 규칙)입니다. [ɾ]은 /t/ 또는 /d/의 변이음으로, 특정 환경에서 예측 가능하게 나타납니다. 새로운 음소 대립을 만들지 않으므로 phonemic rule이 아닙니다.'},

  {s:'Section C',st:'빈칸 채우기',
   sd:'Flapping 관련 핵심 용어를 입력하시오. (영어로, 대소문자 무시)',
   t:'fi',
   q:'Flapping의 결과로 나타나는 음성 기호 [ɾ]의 조음 명칭은? (영어: "alveolar ___")',
   blanks:['flap'],
   labels:['alveolar ___:'],
   e:'정답: flap. [ɾ]은 alveolar flap(치경 탄음)입니다. alveolar trill [r]과 구별해야 합니다.'},

  {s:'Section C',st:'',sd:'',
   t:'fi',
   q:'Flapping 규칙에서 [ɾ]는 /t/ 또는 /d/의 변이음(allophone)입니다. 이처럼 환경에 따라 예측 가능하게 나타나는 규칙의 종류는?',
   blanks:['allophonic'],
   labels:['규칙 종류: ___ rule'],
   e:'정답: allophonic. Flapping은 allophonic rule로, [ɾ]은 /t/ 또는 /d/의 변이음입니다. 음소 대립을 만들지 않는 예측 가능한 규칙입니다.'},

  {s:'Section C',st:'',sd:'',
   t:'fi',
   q:"Flapping으로 'betting'과 'bedding'이 같은 발음이 되는 현상을 무엇이라 하는가?",
   blanks:['neutralization'],
   labels:['음운 현상:'],
   e:'정답: neutralization(중화). Flapping으로 /t/와 /d/의 대립이 사라져 두 단어가 동일하게 발음되는 현상입니다.'},

  {s:'Section C',st:'',sd:'',
   t:'fi',
   q:"Flapping이 일어나는 방언은? (American / British)",
   blanks:['american'],
   labels:['방언:'],
   e:'정답: American (English). Flapping은 미국 영어의 특징입니다. 영국 영어(RP)에서는 flapping이 일어나지 않습니다.'},

  {s:'Section C',st:'',sd:'',
   t:'fi',
   q:"Flapping 환경에서 /t,d/ 앞에 와야 하는 조건은? (stressed / unstressed + vowel)",
   blanks:['stressed'],
   labels:['앞 조건: ___ vowel'],
   e:'정답: stressed (vowel). Flapping의 두 조건 중 하나는 앞에 강세모음(stressed vowel)이 오는 것입니다. 뒤에는 비강세모음(unstressed vowel)이 와야 합니다.'}
];

let ANS, COR;

function build() {
  ANS = new Array(DATA.length).fill(false);
  COR = 0;
  document.getElementById('sc').textContent = 0;
  document.getElementById('st').textContent = DATA.length;
  document.getElementById('prog').style.width = '0%';
  document.getElementById('rb').style.display = 'none';

  const wrap = document.getElementById('qw');
  wrap.innerHTML = '';
  let lastSec = '', num = 0;

  DATA.forEach((q, i) => {
    num++;
    if (q.s !== lastSec) {
      lastSec = q.s;
      const sh = document.createElement('div');
      sh.className = 'ex-sec';
      sh.innerHTML = `<div class="ex-sec-tag">${q.s}</div>
        <div class="ex-sec-title">${q.st}</div>
        ${q.sd ? `<div class="ex-sec-desc">${q.sd}</div>` : ''}`;
      wrap.appendChild(sh);
    }

    const card = document.createElement('div');
    card.className = 'qcard'; card.id = 'qc' + i;

    const typeLabel = {ox:'OX', mc:'객관식', fi:'빈칸'};
    let input = '';

    if (q.t === 'ox') {
      input = `<div class="ox-row">
        <button class="ox-btn" id="bo${i}" onclick="doOX(${i},true)">O</button>
        <button class="ox-btn" id="bx${i}" onclick="doOX(${i},false)">X</button>
      </div>`;
    } else if (q.t === 'mc') {
      input = `<div class="mc-opts">${q.o.map((o,j) =>
        `<button class="mc-btn" id="bm${i}_${j}" onclick="doMC(${i},${j})">${o}</button>`
      ).join('')}</div>`;
    } else {
      input = `<div>${q.blanks.map((_,j) =>
        `<div class="fi-row">
          <span class="fi-lbl">${q.labels[j]}</span>
          <input class="fi-inp" id="fi${i}_${j}" type="text" placeholder="영어로 입력..."
            onkeydown="if(event.key==='Enter')doFI(${i})">
        </div>`).join('')}
        <button class="fi-cfm" onclick="doFI(${i})">확인</button>
      </div>`;
    }

    card.innerHTML = `
      <div class="qmeta">
        <span class="qnum">Q${num}</span>
        <span class="qtag ${q.t}">${typeLabel[q.t]}</span>
      </div>
      <div class="qtext">${q.q}</div>
      ${input}
      <div class="fb" id="fb${i}"></div>`;
    wrap.appendChild(card);
  });
}

function reveal(i, ok) {
  if (ANS[i]) return;
  ANS[i] = true;
  if (ok) COR++;
  const done = ANS.filter(Boolean).length;
  document.getElementById('sc').textContent = COR;
  document.getElementById('prog').style.width = (done / DATA.length * 100) + '%';

  const fb = document.getElementById('fb' + i);
  fb.style.display = 'block';
  fb.className = 'fb ' + (ok ? 'ok' : 'ng');
  fb.innerHTML = `<div class="fb-head">${ok ? '✓ 정답' : '✗ 오답'}</div>${DATA[i].e}`;
  document.getElementById('qc' + i).classList.add(ok ? 'ok' : 'ng');

  if (ANS.every(a => a)) showResult();
}

function doOX(i, v) {
  if (ANS[i]) return;
  const ok = v === DATA[i].a;
  const ob = document.getElementById('bo' + i);
  const xb = document.getElementById('bx' + i);
  ob.disabled = xb.disabled = true;
  if (v)  { ob.classList.add(ok ? 'ok2' : 'ng2'); if (!ok) xb.classList.add('ok2'); }
  else    { xb.classList.add(ok ? 'ok2' : 'ng2'); if (!ok) ob.classList.add('ok2'); }
  reveal(i, ok);
}

function doMC(i, j) {
  if (ANS[i]) return;
  const ok = j === DATA[i].a;
  DATA[i].o.forEach((_, k) => {
    const b = document.getElementById(`bm${i}_${k}`);
    b.disabled = true;
    if (k === DATA[i].a) b.classList.add('ok2');
    else if (k === j && !ok) b.classList.add('ng2');
  });
  reveal(i, ok);
}

function doFI(i) {
  if (ANS[i]) return;
  let allOk = true;
  DATA[i].blanks.forEach((ans, j) => {
    const inp = document.getElementById(`fi${i}_${j}`);
    const ok = inp.value.trim().toLowerCase() === ans.toLowerCase();
    if (!ok) allOk = false;
    inp.disabled = true;
    inp.classList.add(ok ? 'ok2' : 'ng2');
  });
  reveal(i, allOk);
}

function showResult() {
  const pct = Math.round(COR / DATA.length * 100);
  const tiers = [
    {min:90, icon:'🎯', msg:'Flapping 완전 정복!'},
    {min:70, icon:'👏', msg:'틀린 문제 해설을 다시 한번 확인해보세요.'},
    {min:50, icon:'📚', msg:'Flapping 환경 조건을 다시 복습하세요.'},
    {min:0,  icon:'💪', msg:'Flapping 개념부터 다시 정리해보세요.'}
  ];
  const t = tiers.find(x => pct >= x.min);
  const rb = document.getElementById('rb');
  rb.style.display = 'block';
  document.getElementById('ri').textContent = t.icon;
  document.getElementById('rs').textContent = `${COR} / ${DATA.length}점 (${pct}%)`;
  document.getElementById('rm').textContent = t.msg;
  rb.scrollIntoView({behavior:'smooth'});
}

function reset() {
  build();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

build();
</script>
</body>
</html>
