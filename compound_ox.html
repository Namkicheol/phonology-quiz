<script>
const SAVE_KEY='ox_phon_compound_v1';
const TOTAL=15;
let cur=0,answers=new Array(TOTAL).fill(null);
function getScore(){return answers.filter(a=>a&&a.correct).length;}
const Q=[
  {src:"Compound Noun",cat:"강세 위치",text:"<span class='kw1'>blackbird</span>(찌르레기)에서 primary stress는 <span class='kw2'>black</span>에 온다.",ans:true,correct:"정확하다. Compound noun rule에 따라 <span class='kw1'>blackbird</span>는 첫 번째 요소 <span class='kw2'>BLACK</span>bird로 발음된다.",why:"Compound noun(합성명사)에서는 첫 번째 요소에 primary stress가 오는 것이 원칙이다. 'blackbird'는 특정 새 종류(찌르레기)를 가리키는 합성명사이므로 'BLACK'에 강세가 온다.",source:"\"In compound nouns, primary stress falls on the <span class='kw2'>first element</span>: <span class='kw1'>BLACKbird</span>(찌르레기).\" (Yavaş 2011)",compare:[{title:"Compound noun: <span class='kw1'>BLACKbird</span>",desc:"첫 번째 요소 강세 · 찌르레기"},{title:"Noun phrase: <span class='kw3'>black BIRD</span>",desc:"두 번째 요소 강세 · 검은 새"}]},
  {src:"Nuclear Stress Rule",cat:"NSR 적용",text:"<span class='kw3'>black bird</span>(검은 새)라는 명사구에서 primary stress는 <span class='kw2'>bird</span>에 온다.",ans:true,correct:"정확하다. Nuclear Stress Rule(NSR)에 따라 명사구에서는 마지막 주요 요소 <span class='kw2'>BIRD</span>에 핵강세가 온다.",why:"NSR(Nuclear Stress Rule): 구(phrase)에서 핵강세는 마지막 주요 내용어 요소에 온다. 'black bird'는 합성명사가 아닌 형용사+명사 명사구이므로 NSR이 적용되어 'BIRD'에 강세가 온다.",source:"\"The Nuclear Stress Rule assigns nuclear stress to the <span class='kw2'>rightmost major category element</span> in a phrase.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>NSR</span>: black BIRD",desc:"구(phrase) 구조 · 마지막 주요 요소"},{title:"<span class='kw1'>Compound</span>: BLACKbird",desc:"합성명사 구조 · 첫 번째 요소"}]},
  {src:"Compound Noun",cat:"강세 규칙",text:"Compound noun에서는 두 번째 요소에 primary stress가 온다.",ans:false,correct:"틀렸다. Compound noun에서 primary stress는 <span class='kw2'>첫 번째 요소</span>에 온다 — <span class='kw1'>BLACKboard</span>, <span class='kw1'>SUNrise</span>.",why:"Compound noun rule의 핵심: 첫 번째 요소에 primary stress. 두 번째 요소는 secondary stress를 받는다. 이것은 명사구(NSR → 마지막 요소 강세)와 정반대의 패턴이므로 구별이 매우 중요하다.",source:"\"Compound nouns: stress on the <span class='kw2'>FIRST</span> element. Noun phrases: stress on the <span class='kw2'>LAST</span> major element (NSR).\" (Yavaş 2011)",compare:[{title:"Compound noun (합성명사)",desc:"<span class='kw2'>첫째 요소</span> 강세: <span class='kw1'>BLACKboard</span>"},{title:"Noun phrase (명사구)",desc:"<span class='kw2'>마지막 요소</span> 강세: black BOARD"}]},
  {src:"Compound Noun",cat:"강세 패턴 예시",text:"<span class='kw1'>greenhouse</span>(온실)에서 primary stress는 <span class='kw2'>green</span>에 온다.",ans:true,correct:"정확하다. <span class='kw1'>GREENhouse</span>(온실)는 합성명사이므로 첫 번째 요소 <span class='kw2'>GREEN</span>에 primary stress가 온다.",why:"'greenhouse'는 온실이라는 특정 개념을 가진 합성명사이다. 단순히 초록색 집이 아니라 식물을 키우는 특수 건물이므로 compound noun rule이 적용된다.",source:"\"<span class='kw1'>GREENhouse</span>(온실) — compound noun rule: stress on <span class='kw2'>first</span> element.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>GREENhouse</span>",desc:"합성명사 · 온실 · green에 강세"},{title:"<span class='kw3'>green HOUSE</span>",desc:"명사구 · 초록 집 · house에 강세"}]},
  {src:"Nuclear Stress Rule",cat:"NSR vs Compound",text:"<span class='kw3'>green house</span>(초록색 집)에서 primary stress는 <span class='kw2'>house</span>에 온다.",ans:true,correct:"정확하다. 'green house'(초록 집)는 형용사+명사 명사구이므로 NSR에 따라 마지막 주요 요소 <span class='kw2'>HOUSE</span>에 강세가 온다.",why:"의미에 따라 강세 패턴이 달라진다. '온실'이면 합성명사 → GREEN에 강세. '초록색 집'이면 명사구 → HOUSE에 강세. 이 의미-강세 대응이 임용 핵심 포인트이다.",source:"\"<span class='kw3'>green HOUSE</span>(초록 집) — NSR applies to the noun phrase: stress on <span class='kw2'>HOUSE</span>.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>GREENhouse</span>",desc:"합성명사 · 온실"},{title:"<span class='kw3'>green HOUSE</span>",desc:"명사구 · NSR 적용"}]},
  {src:"Nuclear Stress Rule",cat:"NSR 정의",text:"Nuclear Stress Rule(NSR)은 구에서 <span class='kw2'>마지막 주요 요소</span>에 핵강세(nuclear stress)를 부여한다.",ans:true,correct:"정확하다. NSR: 구(phrase) 내에서 핵강세는 <span class='kw2'>rightmost major category element</span>(마지막 주요 범주 요소)에 배정된다.",why:"NSR은 문장/구 수준의 강세 배정 규칙이다. 마지막 내용어(명사, 동사, 형용사, 부사)에 핵강세가 오는 것이 기본(broad focus). 좁은 초점(narrow focus)에서는 변동 가능하다.",source:"\"NSR: nuclear stress is assigned to the <span class='kw2'>rightmost major category element</span> in a phrase/sentence under broad focus.\" (Yavaş 2011)",compare:[{title:"Broad focus (NSR 기본)",desc:"마지막 주요 요소에 핵강세"},{title:"Narrow focus",desc:"초점 받는 요소로 핵강세 이동"}]},
  {src:"Compound Noun",cat:"의미와 강세",text:"<span class='kw1'>ˈblackboard</span>와 <span class='kw3'>black ˈboard</span>의 의미는 동일하다.",ans:false,correct:"틀렸다. <span class='kw1'>ˈblackboard</span>는 '칠판'(합성명사), <span class='kw3'>black ˈboard</span>는 '검은색 판자'(명사구)로 <span class='kw2'>의미가 다르다</span>.",why:"강세 패턴의 차이는 의미 차이를 만들어낸다. 합성명사의 의미는 구성 요소의 단순 합을 넘어선다(칠판 ≠ 검은 판). 이 의미-강세 쌍은 임용에서 자주 출제되는 최소 쌍 유형이다.",source:"\"<span class='kw1'>ˈblackboard</span>(칠판 — compound) vs <span class='kw3'>black ˈboard</span>(검은 판자 — NP): different meanings, different stress.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>ˈblackboard</span>",desc:"합성명사 · 칠판 · 첫 요소 강세"},{title:"<span class='kw3'>black ˈboard</span>",desc:"명사구 · 검은 판자 · 마지막 요소 강세"}]},
  {src:"Compound Noun",cat:"표기 형식",text:"Compound noun은 반드시 두 단어를 분리 표기(띄어쓰기)한다.",ans:false,correct:"틀렸다. Compound noun은 <span class='kw2'>붙여쓰기</span>(blackbird), <span class='kw2'>하이픈</span>(baby-sitter), <span class='kw2'>띄어쓰기</span>(ice cream) 세 가지 형태가 모두 가능하다.",why:"영어 합성명사의 표기 방식은 통일되어 있지 않다. 의미가 합성명사인지 명사구인지는 표기보다 의미와 강세 패턴으로 판단해야 한다.",source:"\"Compound nouns may be written as: (1) one word: blackbird, (2) hyphenated: baby-sitter, (3) two words: ice cream.\" (Yavaş 2011)",compare:[{title:"붙여쓰기",desc:"blackbird, sunrise, doorbell"},{title:"하이픈 / 띄어쓰기",desc:"baby-sitter / ice cream · 모두 합성명사"}]},
  {src:"Nuclear Stress Rule",cat:"NSR 예시",text:"<span class='kw3'>a red ˈcar</span>에서 강세는 NSR에 따라 <span class='kw2'>car</span>에 온다.",ans:true,correct:"정확하다. 'a red car'는 명사구이므로 NSR에 따라 마지막 주요 요소 <span class='kw2'>CAR</span>에 핵강세가 온다.",why:"Broad focus 발화에서 'a red car'는 명사구(관사+형용사+명사)이다. NSR은 마지막 주요 범주 요소인 명사 'car'에 핵강세를 배정한다.",source:"\"<span class='kw3'>a red CAR</span> — NSR assigns nuclear stress to the rightmost major element <span class='kw2'>car</span>.\" (Yavaş 2011)",compare:[{title:"NSR: a red CAR",desc:"명사구 · 마지막 명사에 강세"},{title:"Compound: REDcar?",desc:"'red car'는 합성명사가 아님"}]},
  {src:"Compound Noun",cat:"구조 유형",text:"Compound noun은 항상 <span class='kw4'>형용사+명사</span> 구조다.",ans:false,correct:"틀렸다. Compound noun은 <span class='kw2'>명사+명사</span>(doorbell, sunrise), <span class='kw2'>형용사+명사</span>(blackbird), <span class='kw2'>동사+명사</span>(pickpocket) 등 다양한 구조가 있다.",why:"합성명사의 구조적 유형은 매우 다양하다. 명사+명사(doorbell), 형용사+명사(blackbird), 동사+명사(drawback), 부사+명사(overcoat) 등이 있다. 구조보다는 의미와 강세로 판단하는 것이 중요하다.",source:"\"Compound nouns can be: N+N (doorbell), Adj+N (blackbird), V+N (pickpocket), etc.\" (Yavaş 2011)",compare:[{title:"명사+명사",desc:"doorbell, sunrise, bedroom"},{title:"형용사+명사 / 기타",desc:"blackbird, greenhouse / pickpocket(V+N)"}]},
  {src:"Compound Noun",cat:"합성명사 판별",text:"<span class='kw1'>ˈdoorbell</span>은 compound noun이다.",ans:true,correct:"정확하다. <span class='kw1'>doorbell</span>은 door(명사)+bell(명사)로 구성된 합성명사이며, 강세는 첫 번째 요소 <span class='kw2'>DOOR</span>에 온다.",why:"'doorbell'은 문에 달린 초인종이라는 특정 개념을 가진 합성명사다. 명사+명사 구조의 전형적인 합성명사 예로 강세는 DOORbell로 첫 요소에 온다.",source:"\"<span class='kw1'>DOORbell</span> — N+N compound noun: stress on first element <span class='kw2'>DOOR</span>.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>DOORbell</span> (합성명사)",desc:"N+N 구조 · 초인종 · 첫 요소 강세"},{title:"door BELL (명사구)",desc:"문 위의 종 · NSR · 마지막 요소 강세"}]},
  {src:"Nuclear Stress Rule",cat:"NSR 예시",text:"<span class='kw3'>a tall ˈman</span>에서 primary stress는 <span class='kw2'>man</span>이다.",ans:true,correct:"정확하다. 'a tall man'은 명사구이므로 NSR에 따라 마지막 주요 요소 <span class='kw2'>MAN</span>에 핵강세가 온다.",why:"NSR은 broad focus 발화에서 구의 마지막 주요 내용어에 핵강세를 배정한다. 'a tall man'에서 man이 마지막 주요 범주 요소(명사)이므로 핵강세를 받는다.",source:"\"<span class='kw3'>a tall MAN</span> — NSR: nuclear stress on rightmost major category element <span class='kw2'>man</span>.\" (Yavaş 2011)",compare:[{title:"NSR 적용",desc:"a tall MAN · 마지막 명사에 강세"},{title:"강조 이동",desc:"a TALL man · 키를 대조 강조할 때"}]},
  {src:"Compound Noun",cat:"이중 강세",text:"Compound noun의 두 번째 요소는 <span class='kw2'>secondary stress</span>를 받는다.",ans:true,correct:"정확하다. 합성명사에서 첫 번째 요소는 primary stress, 두 번째 요소는 <span class='kw2'>secondary stress</span>를 받는다 — e.g. <span class='kw1'>ˈblack·ˌbird</span>.",why:"합성명사는 두 요소 모두 강세를 받지만 등급이 다르다. 첫째=primary(ˈ), 둘째=secondary(ˌ). 이와 달리 명사구에서는 마지막 요소만 primary stress를 받는다.",source:"\"In compound nouns: first element = primary stress, second element = <span class='kw2'>secondary stress</span>. e.g. <span class='kw1'>ˈblackˌbird</span>.\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>ˈblackˌbird</span>",desc:"첫째=primary · 둘째=secondary"},{title:"<span class='kw3'>black ˈbird</span>",desc:"명사구 · 마지막=primary · 첫째=약세"}]},
  {src:"Nuclear Stress Rule",cat:"NSR 기능",text:"NSR은 <span class='kw2'>새로운 정보(new information)</span>를 강조한다.",ans:true,correct:"정확하다. NSR이 배정하는 핵강세는 broad focus에서 <span class='kw2'>새로운 정보</span>를 나타내며 발화에서 가장 두드러진 요소를 표시한다.",why:"NSR은 기본적으로 broad focus(전체 발화가 새 정보)일 때 마지막 주요 요소에 핵강세를 부여한다. 이 핵강세는 청자에게 화자가 전달하려는 새로운 정보를 신호한다.",source:"\"The nuclear stress assigned by NSR highlights <span class='kw2'>new information</span>. Under broad focus, the rightmost major element receives nuclear stress.\" (Yavaş 2011)",compare:[{title:"Broad focus",desc:"전체가 새 정보 · NSR 기본 적용"},{title:"Narrow focus",desc:"특정 요소가 새 정보 · 핵강세 이동"}]},
  {src:"Compound Noun",cat:"합성명사 예시",text:"<span class='kw1'>ˈsunrise</span>는 compound noun이고 <span class='kw2'>sun</span>에 강세가 온다.",ans:true,correct:"정확하다. <span class='kw1'>sunrise</span>는 sun(명사)+rise(명사/동사)로 구성된 합성명사이며, 강세는 첫 번째 요소 <span class='kw2'>SUN</span>에 온다.",why:"'sunrise'(일출)는 명사+명사(또는 명사+동사) 합성명사의 대표 예다. 합성명사 규칙에 따라 첫 번째 요소 'SUN'에 primary stress가 오고 '-rise'는 secondary stress를 받는다.",source:"\"<span class='kw1'>ˈsunrise</span> — compound noun: N+N structure, stress on <span class='kw2'>SUN</span> (first element).\" (Yavaş 2011)",compare:[{title:"<span class='kw1'>ˈSUNrise</span>",desc:"합성명사 · 일출 · 첫 요소 강세"},{title:"<span class='kw1'>ˈSUNset</span>",desc:"합성명사 · 일몰 · 동일 패턴"}]}
];
function renderExp(q,isCorrect){
  const three=q.compare&&q.compare.length===3;
  const cmp=q.compare?`<div class="sec-label">📊 비교 정리</div><div class="compare${three?' three':''}">${q.compare.map(c=>`<div class="compare-item"><div class="ci-title">${c.title}</div><p>${c.desc}</p></div>`).join('')}</div>`:'';
  return `<div class="exp show"><div class="exp-header"><span>${isCorrect?'✅ 정답':'❌ 오답'} · 해설</span></div><div class="exp-answer"><div class="ans-label">핵심 정정</div><div class="ans-text">${q.correct}</div></div><div class="exp-body"><div class="sec-label">📖 상세 설명</div><p>${q.why}</p><div class="sec-label">📌 Source</div><div class="def-box"><p>${q.source}</p></div>${cmp}</div></div>`;
}
function renderNav(){
  document.getElementById('nav').innerHTML=answers.map((a,i)=>{
    let cls='nd';
    if(i===cur)cls+=' cur';
    else if(a!==null)cls+=a.correct?' ok':' ng';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}
function render(){
  if(cur>=TOTAL){
    document.getElementById('qa').style.display='none';
    document.getElementById('sc').classList.add('show');
    const s=getScore();
    document.getElementById('fs').textContent=s;
    const p=s/TOTAL;
    document.getElementById('rm').textContent=p===1?'🎉 Perfect!':p>=.8?'👏 Great!':p>=.6?'😊 Good!':'💪 Keep going!';
    document.getElementById('rs').textContent=`${TOTAL}문제 중 ${s}문제 정답 (${Math.round(p*100)}%)`;
    setTimeout(function(){window.showScorePopup&&window.showScorePopup(s,TOTAL);},400);
    renderNav();return;
  }
  document.getElementById('sc').classList.remove('show');
  document.getElementById('qa').style.display='block';
  renderNav();
  const q=Q[cur];
  document.getElementById('bf').style.width=((cur+1)/TOTAL*100).toFixed(1)+'%';
  document.getElementById('pt').textContent=`${cur+1} / ${TOTAL}`;
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  const a=answers[cur];
  if(a!==null){
    let oBtnCls='',xBtnCls='';
    if(a.picked===true){oBtnCls=a.correct?'co':'wp';if(!a.correct)xBtnCls='cx';}
    else{xBtnCls=a.correct?'cx':'wp';if(!a.correct)oBtnCls='co';}
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn ${oBtnCls}" disabled>⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn ${xBtnCls}" disabled>❌<span class="lb">WRONG</span></button></div><div class="badge ${a.correct?'ok':'ng'}">${a.correct?'✅ 정답!':'❌ 오답! 정답은 '+(q.ans?'O':'X')}</div><div>${renderExp(q,a.correct)}</div><button class="next-btn show" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }else{
    document.getElementById('qa').innerHTML=`<div class="card"><div class="q-meta"><span class="q-num">Q${cur+1}</span><span class="q-src">${q.src}</span><span class="q-cat">${q.cat}</span></div><div class="q-text">${q.text}</div><div class="ox-btns"><button class="ox-btn o-btn" onclick="pick(true)" id="ob">⭕<span class="lb">CORRECT</span></button><button class="ox-btn x-btn" onclick="pick(false)" id="xb">❌<span class="lb">WRONG</span></button></div><div id="bd" class="badge"></div><div id="ep"></div><button class="next-btn" id="nb" onclick="next()">${cur<TOTAL-1?'Next →':'결과 보기 →'}</button></div>`;
  }
}
function pick(val){
  const q=Q[cur];
  document.getElementById('ob').disabled=true;
  document.getElementById('xb').disabled=true;
  const ok=val===q.ans;
  answers[cur]={picked:val,correct:ok};
  if(ok){if(typeof playOk==='function')playOk();}else{if(typeof playNg==='function')playNg();}
  const bd=document.getElementById('bd');
  bd.textContent=ok?'✅ 정답!':`❌ 오답! 정답은 ${q.ans?'O':'X'}`;
  bd.className='badge '+(ok?'ok':'ng');
  document.getElementById(val?'ob':'xb').classList.add(ok?(val?'co':'cx'):'wp');
  if(!ok)document.getElementById(q.ans?'ob':'xb').classList.add(q.ans?'co':'cx');
  document.getElementById('ep').innerHTML=renderExp(q,ok);
  document.getElementById('nb').classList.add('show');
  document.getElementById('ps').textContent=`정답 ${getScore()}개`;
  renderNav();saveProgress();
}
function next(){cur++;saveProgress();render();}
function jumpTo(i){cur=i;render();document.getElementById('qa').scrollIntoView({behavior:'smooth',block:'start'});}
function saveProgress(){localStorage.setItem(SAVE_KEY,JSON.stringify({cur,answers}));}
function freshStart(){localStorage.removeItem(SAVE_KEY);cur=0;answers=new Array(TOTAL).fill(null);document.getElementById('rb').style.display='none';document.getElementById('sc').classList.remove('show');document.getElementById('qa').style.display='block';renderNav();render();}
(function(){
  const saved=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(saved&&saved.answers&&saved.cur>=0&&saved.cur<TOTAL){
    cur=saved.cur;answers=saved.answers;
    const done=answers.filter(a=>a!==null).length;
    if(done>0){document.getElementById('rb-msg').textContent=`이어서 풀기 중 · ${done}/${TOTAL} 문제 완료 (정답 ${getScore()}개)`;document.getElementById('rb').style.display='block';}
  }
  renderNav();render();
})();
</script>
</body>
